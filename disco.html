<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disco Mode — davide's workshop</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0d0f1a;
            color: #e8e8e8;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background: #12152a;
            padding: 0.7rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            border-bottom: 1px solid rgba(240,192,48,0.2);
            flex-shrink: 0;
        }
        header a {
            color: #f0c030;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
        }
        header a:hover { text-decoration: underline; }
        header h1 {
            font-size: 1.3rem;
            font-weight: 900;
            letter-spacing: 3px;
            background: linear-gradient(90deg, #ff00cc, #ff6600, #ffcc00, #00ff88, #00ccff, #cc00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .controls {
            background: #12152a;
            padding: 0.65rem 1.5rem;
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: flex-end;
            border-bottom: 1px solid rgba(240,192,48,0.1);
            flex-shrink: 0;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }
        label {
            font-size: 0.72rem;
            color: #9090b0;
            letter-spacing: 0.6px;
            text-transform: uppercase;
        }
        select {
            background: #161828;
            color: #e8e8e8;
            border: 1px solid rgba(240,192,48,0.25);
            padding: 0.4rem 0.75rem;
            border-radius: 6px;
            font-size: 0.85rem;
            min-width: 210px;
            outline: none;
            cursor: pointer;
        }
        select:focus { border-color: #f0c030; }

        #toggleBtn {
            background: linear-gradient(135deg, #dca50c, #f0c030);
            color: #0d0f1a;
            font-weight: 800;
            padding: 0.45rem 1.6rem;
            border: none;
            border-radius: 40px;
            font-size: 0.92rem;
            cursor: pointer;
            letter-spacing: 0.4px;
            transition: transform 0.15s, box-shadow 0.15s;
            box-shadow: 0 3px 14px rgba(220,165,12,0.4);
        }
        #toggleBtn:hover { transform: translateY(-2px); box-shadow: 0 6px 22px rgba(220,165,12,0.6); }
        #toggleBtn.running {
            background: linear-gradient(135deg, #aa2222, #ee4444);
            box-shadow: 0 3px 14px rgba(200,50,50,0.35);
        }
        #toggleBtn.running:hover { box-shadow: 0 6px 22px rgba(200,50,50,0.55); }

        #status {
            font-size: 0.78rem;
            color: #9090b0;
            align-self: flex-end;
            padding-bottom: 0.4rem;
        }
        #status.ok  { color: #44cc88; }
        #status.err { color: #ee5544; }

        #discoCanvas {
            flex: 1;
            width: 100%;
            display: block;
        }
    </style>
</head>
<body>

<header>
    <a href="index.html">← Back</a>
    <h1>DISCO MODE</h1>
</header>

<div class="controls">
    <div class="control-group">
        <label for="micSelect">Microphone</label>
        <select id="micSelect"><option value="">Loading…</option></select>
    </div>
    <div class="control-group">
        <label for="speakerSelect">Speaker</label>
        <select id="speakerSelect"><option value="">Loading…</option></select>
    </div>
    <button id="toggleBtn">Start Disco</button>
    <span id="status">Select devices and hit Start.</span>
</div>

<canvas id="discoCanvas"></canvas>

<script>
// ── Refs ──────────────────────────────────────────────────────────────────────
const canvas        = document.getElementById('discoCanvas');
const ctx           = canvas.getContext('2d');
const micSelect     = document.getElementById('micSelect');
const speakerSelect = document.getElementById('speakerSelect');
const toggleBtn     = document.getElementById('toggleBtn');
const statusEl      = document.getElementById('status');

// ── Canvas resize ─────────────────────────────────────────────────────────────
function resizeCanvas() {
    canvas.width  = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// ── Device enumeration ────────────────────────────────────────────────────────
async function loadDevices() {
    try {
        const tmp = await navigator.mediaDevices.getUserMedia({ audio: true });
        tmp.getTracks().forEach(t => t.stop());
    } catch (e) {
        setStatus('Mic permission denied — allow access and reload.', 'err');
        return;
    }

    const devices = await navigator.mediaDevices.enumerateDevices();
    const inputs  = devices.filter(d => d.kind === 'audioinput');
    const outputs = devices.filter(d => d.kind === 'audiooutput');

    micSelect.innerHTML = inputs.map((d, i) =>
        `<option value="${d.deviceId}">${d.label || 'Microphone ' + (i + 1)}</option>`
    ).join('');

    speakerSelect.innerHTML = outputs.length
        ? outputs.map((d, i) =>
            `<option value="${d.deviceId}">${d.label || 'Speaker ' + (i + 1)}</option>`
          ).join('')
        : '<option value="">Default speaker</option>';

    setStatus('Ready to disco!');
}

function setStatus(msg, type = '') {
    statusEl.textContent = msg;
    statusEl.className   = type;
}

// ── Audio state ───────────────────────────────────────────────────────────────
let audioCtx  = null;
let micStream = null;
let analyser  = null;
let audioEl   = null;
let running   = false;

async function startDisco() {
    const micId = micSelect.value;
    const spkId = speakerSelect.value;

    try {
        micStream = await navigator.mediaDevices.getUserMedia({
            audio: {
                deviceId:         micId ? { exact: micId } : undefined,
                echoCancellation: false,
                noiseSuppression: false,
                autoGainControl:  false
            }
        });
    } catch (e) {
        setStatus('Microphone error: ' + e.message, 'err');
        return;
    }

    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    analyser = audioCtx.createAnalyser();
    analyser.fftSize              = 512;
    analyser.smoothingTimeConstant = 0.78;

    const source = audioCtx.createMediaStreamSource(micStream);
    const dest   = audioCtx.createMediaStreamDestination();
    source.connect(analyser);
    analyser.connect(dest);

    audioEl = new Audio();
    audioEl.srcObject = dest.stream;

    if (spkId && typeof audioEl.setSinkId === 'function') {
        try { await audioEl.setSinkId(spkId); }
        catch (e) { setStatus('Speaker routing unavailable, using default.', ''); }
    }

    await audioEl.play().catch(e => setStatus('Playback error: ' + e.message, 'err'));

    running = true;
    toggleBtn.textContent = 'Stop Disco';
    toggleBtn.classList.add('running');
    setStatus('Disco is live!', 'ok');
}

function stopDisco() {
    running = false;
    if (audioEl)   { audioEl.pause(); audioEl.srcObject = null; audioEl = null; }
    if (audioCtx)  { audioCtx.close(); audioCtx = null; }
    if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
    analyser = null;
    toggleBtn.textContent = 'Start Disco';
    toggleBtn.classList.remove('running');
    setStatus('Stopped.');
}

toggleBtn.addEventListener('click', () => {
    if (running) stopDisco(); else startDisco();
});

// ── Visual state ──────────────────────────────────────────────────────────────
let globalHue  = 0;
let beamAngle  = 0;
let beatEnergy = 0;
let idleAngle  = 0;

const BEAM_COLORS  = ['#ff0055','#ff6600','#ffcc00','#00ff88','#00ccff','#cc00ff'];
const BEAM_COUNT   = BEAM_COLORS.length;
const particles    = [];

// ── Main render loop ──────────────────────────────────────────────────────────
function mainLoop() {
    const W  = canvas.width;
    const H  = canvas.height;
    const cx = W / 2;
    const cy = H / 2;

    if (running && analyser) {
        const bufLen = analyser.frequencyBinCount;
        const freq   = new Uint8Array(bufLen);
        analyser.getByteFrequencyData(freq);

        // Overall + bass energy
        let sum = 0, bassSum = 0;
        for (let i = 0;  i < bufLen; i++) sum += freq[i];
        for (let i = 0;  i < 10; i++)     bassSum += freq[i];
        const avgEnergy  = sum / bufLen / 255;
        const bassNorm   = Math.min(bassSum / 10 / 255, 1);
        beatEnergy += (bassNorm - beatEnergy) * 0.18;

        globalHue  = (globalHue + 0.7 + beatEnergy * 5) % 360;
        beamAngle  = (beamAngle + 0.007 + beatEnergy * 0.045) % (Math.PI * 2);

        // Background (trail fade)
        ctx.fillStyle = `rgba(13,15,26,${0.22 - beatEnergy * 0.1})`;
        ctx.fillRect(0, 0, W, H);

        // Beat flash
        if (beatEnergy > 0.3) {
            ctx.fillStyle = `hsla(${globalHue},100%,55%,${(beatEnergy - 0.3) * 0.14})`;
            ctx.fillRect(0, 0, W, H);
        }

        drawBeams(cx, cy, W, H, beatEnergy);
        drawRadialBars(cx, cy, freq, bufLen);
        drawDiscoBall(cx, cy, beatEnergy);
        spawnParticles(cx, cy, beatEnergy);
        updateDrawParticles();

    } else {
        // Idle mode — gentle slow visuals
        idleAngle = (idleAngle + 0.003) % (Math.PI * 2);
        globalHue = (globalHue + 0.25) % 360;

        ctx.fillStyle = 'rgba(13,15,26,0.12)';
        ctx.fillRect(0, 0, W, H);

        // Slow lazy beams
        const len = Math.max(W, H) * 1.5;
        for (let i = 0; i < 4; i++) {
            const a = idleAngle + (Math.PI / 2) * i;
            ctx.save();
            ctx.globalAlpha = 0.05;
            ctx.fillStyle   = BEAM_COLORS[i * 2 % BEAM_COLORS.length];
            ctx.translate(cx, cy);
            ctx.rotate(a);
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(-0.05 * len, len);
            ctx.lineTo( 0.05 * len, len);
            ctx.closePath();
            ctx.fill();
            ctx.restore();
        }
        ctx.globalAlpha = 1;
        drawDiscoBall(cx, cy, 0);
    }

    requestAnimationFrame(mainLoop);
}
mainLoop();

// ── Draw helpers ──────────────────────────────────────────────────────────────

function drawBeams(cx, cy, W, H, beat) {
    const len    = Math.max(W, H) * 1.5;
    const spread = 0.032 + beat * 0.048;

    for (let i = 0; i < BEAM_COUNT; i++) {
        const angle = beamAngle + (Math.PI * 2 / BEAM_COUNT) * i;

        ctx.save();
        ctx.globalAlpha = 0.13 + beat * 0.22;
        ctx.fillStyle   = BEAM_COLORS[i];
        ctx.translate(cx, cy);
        ctx.rotate(angle);

        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(Math.cos(-spread) * len, Math.sin(-spread) * len);
        ctx.lineTo(Math.cos( spread) * len, Math.sin( spread) * len);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
    }
    ctx.globalAlpha = 1;
}

function drawRadialBars(cx, cy, freq, bufLen) {
    const minDim    = Math.min(canvas.width, canvas.height);
    const innerR    = minDim * 0.175;
    const maxBarLen = minDim * 0.22;
    const bars      = Math.min(bufLen, 128);

    ctx.lineWidth = (canvas.width / bars) * 1.05;

    for (let i = 0; i < bars; i++) {
        const amp   = freq[i] / 255;
        const angle = (i / bars) * Math.PI * 2 - Math.PI / 2;
        const barL  = innerR * 0.08 + amp * maxBarLen;
        const barH  = (globalHue + (i / bars) * 300) % 360;

        const x1 = cx + Math.cos(angle) * innerR;
        const y1 = cy + Math.sin(angle) * innerR;
        const x2 = cx + Math.cos(angle) * (innerR + barL);
        const y2 = cy + Math.sin(angle) * (innerR + barL);

        ctx.strokeStyle = `hsl(${barH}, 100%, ${45 + amp * 30}%)`;
        ctx.shadowColor = `hsl(${barH}, 100%, 60%)`;
        ctx.shadowBlur  = 6 + amp * 10;
        ctx.globalAlpha = 0.7 + amp * 0.3;

        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();
    }

    ctx.shadowBlur  = 0;
    ctx.globalAlpha = 1;
}

function drawDiscoBall(cx, cy, beat) {
    const minDim = Math.min(canvas.width, canvas.height);
    const r      = minDim * (0.048 + beat * 0.018);
    const spin   = Date.now() / 1400;

    // Outer glow
    const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, r * 2.8);
    glow.addColorStop(0, `hsla(${globalHue}, 100%, 65%, ${0.45 + beat * 0.3})`);
    glow.addColorStop(1, 'transparent');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(cx, cy, r * 2.8, 0, Math.PI * 2);
    ctx.fill();

    // Mirror tiles mapped to sphere surface
    const rows = 6, cols = 10;
    for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
            const phi   = ((row + 0.5) / rows) * Math.PI;
            const theta = ((col + 0.5) / cols) * Math.PI * 2 + spin;

            const x = Math.sin(phi) * Math.cos(theta);
            const y = -Math.cos(phi);
            const z = Math.sin(phi) * Math.sin(theta);

            if (z < 0) continue; // back-face cull

            const px     = cx + x * r;
            const py     = cy + y * r;
            const tSize  = r * 0.2 * (0.4 + z * 0.6);
            const tileH  = (globalHue + row * 50 + col * 24) % 360;
            const bright = 55 + z * 40;

            ctx.fillStyle  = `hsl(${tileH}, 100%, ${bright}%)`;
            ctx.shadowColor= `hsl(${tileH}, 100%, 70%)`;
            ctx.shadowBlur = 5 + beat * 8;
            ctx.beginPath();
            ctx.rect(px - tSize / 2, py - tSize / 2, tSize, tSize);
            ctx.fill();
        }
    }

    ctx.shadowBlur  = 0;
    ctx.globalAlpha = 1;
}

function spawnParticles(cx, cy, beat) {
    if (beat < 0.18) return;
    const count = Math.floor(beat * 6);
    for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 1.5 + beat * 5 + Math.random() * 2.5;
        particles.push({
            x:     cx + Math.cos(angle) * 18,
            y:     cy + Math.sin(angle) * 18,
            vx:    Math.cos(angle) * speed,
            vy:    Math.sin(angle) * speed,
            life:  1,
            decay: 0.014 + Math.random() * 0.018,
            r:     2 + Math.random() * 2.5,
            hue:   (globalHue + Math.random() * 80 - 40 + 360) % 360
        });
    }
}

function updateDrawParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x   += p.vx;
        p.y   += p.vy;
        p.vx  *= 0.97;
        p.vy  *= 0.97;
        p.life -= p.decay;

        if (p.life <= 0) { particles.splice(i, 1); continue; }

        ctx.globalAlpha = p.life * 0.85;
        ctx.fillStyle   = `hsl(${p.hue}, 100%, 65%)`;
        ctx.shadowColor = `hsl(${p.hue}, 100%, 70%)`;
        ctx.shadowBlur  = 5;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.shadowBlur  = 0;
    ctx.globalAlpha = 1;
}

// ── Init ──────────────────────────────────────────────────────────────────────
loadDevices();
</script>
</body>
</html>
