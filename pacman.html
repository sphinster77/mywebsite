<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pac-Man – Davide's Workshop</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #000;
            color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        header {
            width: 100%;
            background: #0a0a1a;
            border-bottom: 2px solid rgba(240,192,48,0.2);
            padding: 0.6rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        header a { color: #f0c030; text-decoration: none; font-weight: 700; font-size: 0.9rem; }
        header h1 { font-size: 1.2rem; font-weight: 800; color: #f0c030; }

        #hud {
            display: flex;
            gap: 2rem;
            align-items: center;
            padding: 0.5rem 1rem;
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 1px;
        }
        #hud span { color: #f0c030; font-size: 1.1rem; }

        #canvas-wrap { position: relative; }

        #gameCanvas {
            display: block;
            border: 2px solid #1a1aff;
            box-shadow: 0 0 30px rgba(26,26,255,0.4);
        }

        #overlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            border: 3px solid #f0c030;
            border-radius: 16px;
            padding: 1.8rem 2.2rem;
            text-align: center;
            z-index: 10;
            min-width: 240px;
        }
        #overlay h2 { color: #f0c030; font-size: 1.6rem; margin-bottom: 0.4rem; }
        #overlay p  { color: #ccc; font-size: 0.85rem; margin-bottom: 1rem; line-height: 1.5; }
        #overlay button {
            background: linear-gradient(135deg, #dca50c, #f0c030);
            color: #000; border: none; border-radius: 10px;
            padding: 0.65rem 1.8rem; font-size: 0.95rem;
            font-weight: 800; cursor: pointer; transition: transform 0.15s;
        }
        #overlay button:hover { transform: scale(1.05); }

        .lives-icons { display: flex; gap: 4px; }

        #mobile-controls {
            display: none;
            gap: 0.4rem;
            margin-top: 0.6rem;
            flex-direction: column;
            align-items: center;
        }
        .ctrl-row { display: flex; gap: 0.4rem; }
        .ctrl-btn {
            background: #1a1a2e; border: 2px solid #f0c030; color: #f0c030;
            font-size: 1.3rem; width: 52px; height: 52px; border-radius: 10px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            user-select: none; -webkit-user-select: none;
        }
        .ctrl-btn:active { background: #2a2a4e; }
        @media (max-width: 560px), (pointer: coarse) { #mobile-controls { display: flex; } }
    </style>
</head>
<body>

<header>
    <a href="index.html">← Back</a>
    <h1>👾 Pac-Man</h1>
</header>

<div id="hud">
    <div>SCORE <span id="score-val">0</span></div>
    <div>BEST <span id="hi-val">0</span></div>
    <div>LEVEL <span id="level-val">1</span></div>
    <div class="lives-icons" id="lives-icons"></div>
</div>

<div id="canvas-wrap">
    <canvas id="gameCanvas"></canvas>
    <div id="overlay">
        <h2>PAC-MAN</h2>
        <p>Eat all the dots!<br>Avoid ghosts — eat a power pellet to turn them blue.<br><br>Arrow keys or WASD</p>
        <button onclick="startGame()">START</button>
    </div>
</div>

<div id="mobile-controls">
    <div class="ctrl-row"><button class="ctrl-btn" id="btn-up">▲</button></div>
    <div class="ctrl-row">
        <button class="ctrl-btn" id="btn-left">◀</button>
        <button class="ctrl-btn" id="btn-down">▼</button>
        <button class="ctrl-btn" id="btn-right">▶</button>
    </div>
</div>

<script>
// ─── Map: 0=dot  1=wall  2=empty  3=power pellet  4=ghost-door ─────────────
const TMAP = [
    '#####################',
    '#........#........  #',
    '#.##.###.#.###.##.  #',
    '#O##.###.#.###.##.O #',
    '#.##.###.#.###.##.  #',
    '#...................#',
    '#.##.#.#####.#.##.  #',
    '#....#...#...#....  #',
    '#####.## # ##.#####',
    '    #.#       #.#    ',
    '#####.# ##-## #.#####',
    '         ###         ',
    '#####.# ##### #.#####',
    '    #.#       #.#    ',
    '#####.# ##### #.#####',
    '#........#........  #',
    '#.##.###.#.###.##.  #',
    '#O.#.....   .....#.O#',
    '###.#.#.#####.#.#.###',
    '#......#...#...#....#',
    '#.##########.##.####',
    '#...................#',
    '#####################',
];

// Build numeric map from string
const ROWS = TMAP.length;
const COLS = TMAP[0].length;

function buildMap() {
    return TMAP.map(row => {
        const arr = [];
        for (let c = 0; c < COLS; c++) {
            const ch = row[c] || ' ';
            if (ch === '#') arr.push(1);
            else if (ch === '.') arr.push(0);
            else if (ch === 'O') arr.push(3);
            else if (ch === '-') arr.push(4);
            else arr.push(2);
        }
        return arr;
    });
}

// Canvas
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
const CELL   = 24;
canvas.width  = COLS * CELL;
canvas.height = ROWS * CELL;

// ─── Game state ───────────────────────────────────────────────────────────────
let map, score, hiScore = 0, lives, level, totalDots, gameState;
let pacman, ghosts, frighTimer;
let animId;

const FRIGHT_DUR  = 7000; // ms
const GHOST_COLS  = ['#ff0000','#ffb8ff','#00ffff','#ffb852'];
const GHOST_NAMES = ['Blinky','Pinky','Inky','Clyde'];

// Speed in cells/second
const PAC_SPEED   = lvl => 1.0 + lvl * 0.05;
const GHOST_SPEED = lvl => 0.8 + lvl * 0.05;
const FRIGHT_SPEED = 0.5;

// ─── Helpers ──────────────────────────────────────────────────────────────────
function isWall(col, row) {
    if (row < 0 || row >= ROWS) return true;
    const wc = ((col % COLS) + COLS) % COLS;
    return map[row][wc] === 1;
}

function isBlockedForGhost(col, row, fromHouse) {
    if (row < 0 || row >= ROWS) return true;
    const wc = ((col % COLS) + COLS) % COLS;
    const v = map[row][wc];
    if (v === 1) return true;
    if (v === 4 && !fromHouse) return true;
    return false;
}

function wrapCol(c) { return ((c % COLS) + COLS) % COLS; }

// ─── Init ─────────────────────────────────────────────────────────────────────
function startGame() {
    score = 0; lives = 3; level = 1;
    hiScore = hiScore || 0;
    document.getElementById('overlay').style.display = 'none';
    initLevel();
}

function initLevel() {
    map = buildMap();
    totalDots = 0;
    for (let r = 0; r < ROWS; r++)
        for (let c = 0; c < COLS; c++)
            if (map[r][c] === 0 || map[r][c] === 3) totalDots++;

    frighTimer = 0;

    // Pac-Man: grid-based movement
    // col/row = current cell, nextCol/nextRow = target cell, progress 0→1
    pacman = {
        col: 10, row: 17,
        nextCol: 10, nextRow: 17,
        progress: 1,        // 1 = arrived, 0 = just departed
        dirX: 0, dirY: 0,   // current moving direction
        queueX: 0, queueY: 0, // queued direction
        speed: PAC_SPEED(level),
        dead: false, deadAnim: 0,
        mouthAngle: 0.25, mouthDir: -1,
    };

    ghosts = GHOST_NAMES.map((name, i) => ({
        name, color: GHOST_COLS[i],
        col: 10, row: 11,
        nextCol: 10, nextRow: 11,
        progress: 1,
        dirX: i % 2 === 0 ? 1 : -1, dirY: 0,
        speed: GHOST_SPEED(level),
        frightened: false,
        eaten: false,
        inHouse: true,
        exitDelay: i * 3000,
        ghostsEatenThisFright: 0,
    }));

    gameState = 'playing';
    updateHUD();
    if (animId) cancelAnimationFrame(animId);
    lastTs = null;
    animId = requestAnimationFrame(loop);
}

function resetAfterDeath() {
    frighTimer = 0;
    pacman.col = 10; pacman.row = 17;
    pacman.nextCol = 10; pacman.nextRow = 17;
    pacman.progress = 1;
    pacman.dirX = 0; pacman.dirY = 0;
    pacman.queueX = 0; pacman.queueY = 0;
    pacman.dead = false; pacman.deadAnim = 0;

    ghosts.forEach((g, i) => {
        g.col = 10; g.row = 11;
        g.nextCol = 10; g.nextRow = 11;
        g.progress = 1;
        g.dirX = i % 2 === 0 ? 1 : -1; g.dirY = 0;
        g.frightened = false; g.eaten = false;
        g.inHouse = true; g.exitDelay = i * 3000;
    });

    gameState = 'playing';
}

// ─── Main loop ────────────────────────────────────────────────────────────────
let lastTs = null;
let eatenThisFright = 0;

function loop(ts) {
    if (lastTs === null) lastTs = ts;
    const dt = Math.min(ts - lastTs, 50); // cap at 50ms
    lastTs = ts;

    if (gameState === 'playing') {
        if (frighTimer > 0) {
            frighTimer -= dt;
            if (frighTimer <= 0) {
                frighTimer = 0;
                ghosts.forEach(g => { if (!g.eaten) g.frightened = false; });
            }
        }
        updatePacman(dt);
        ghosts.forEach(g => updateGhost(g, dt));
        checkCollisions();
    } else if (gameState === 'dying') {
        pacman.deadAnim += dt * 0.003;
        if (pacman.deadAnim >= 1) {
            lives--;
            updateHUD();
            if (lives <= 0) {
                gameState = 'gameover';
                showOverlay('GAME OVER', `Score: ${score}`, 'Play Again', startGame);
            } else {
                resetAfterDeath();
            }
        }
    }

    render(ts);
    animId = requestAnimationFrame(loop);
}

// ─── Pac-Man movement (grid-based) ───────────────────────────────────────────
function updatePacman(dt) {
    const pm = pacman;

    // Advance progress
    pm.progress += (pm.speed * dt) / (CELL * 1000 / 1000);

    if (pm.progress >= 1) {
        // Arrived at nextCol/nextRow
        pm.col = pm.nextCol;
        pm.row = pm.nextRow;
        pm.progress = 0;

        // Eat dot at current cell
        const wc = wrapCol(pm.col);
        if (map[pm.row][wc] === 0) {
            map[pm.row][wc] = 2;
            score += 10; totalDots--;
            if (score > hiScore) hiScore = score;
            updateHUD();
            if (totalDots <= 0) { nextLevel(); return; }
        } else if (map[pm.row][wc] === 3) {
            map[pm.row][wc] = 2;
            score += 50; totalDots--;
            if (score > hiScore) hiScore = score;
            eatenThisFright = 0;
            frighTimer = FRIGHT_DUR;
            ghosts.forEach(g => { if (!g.eaten) g.frightened = true; });
            updateHUD();
            if (totalDots <= 0) { nextLevel(); return; }
        }

        // Choose next cell: try queued direction first, then current
        const dirs = [
            { x: pm.queueX, y: pm.queueY },
            { x: pm.dirX,   y: pm.dirY   },
        ];
        let moved = false;
        for (const d of dirs) {
            if (d.x === 0 && d.y === 0) continue;
            const nc = wrapCol(pm.col + d.x);
            const nr = pm.row + d.y;
            if (!isWall(nc, nr)) {
                pm.dirX = d.x; pm.dirY = d.y;
                pm.nextCol = nc; pm.nextRow = nr;
                moved = true;
                break;
            }
        }
        if (!moved) {
            pm.dirX = 0; pm.dirY = 0;
            pm.nextCol = pm.col; pm.nextRow = pm.row;
            pm.progress = 1;
        }
    }
}

function nextLevel() {
    gameState = 'levelup';
    level++;
    setTimeout(() => {
        initLevel();
    }, 1500);
}

// ─── Ghost movement ────────────────────────────────────────────────────────────
function updateGhost(g, dt) {
    // Exit delay
    if (g.inHouse) {
        g.exitDelay -= dt;
        if (g.exitDelay <= 0) {
            g.inHouse = false;
            // Teleport above house
            g.col = 10; g.row = 8;
            g.nextCol = 10; g.nextRow = 8;
            g.progress = 1;
            g.dirX = Math.random() < 0.5 ? 1 : -1; g.dirY = 0;
        } else {
            return;
        }
    }

    const spd = g.eaten ? GHOST_SPEED(level) * 2 : g.frightened ? FRIGHT_SPEED : GHOST_SPEED(level);
    g.progress += spd * dt / 1000;

    if (g.progress >= 1) {
        g.col = g.nextCol;
        g.row = g.nextRow;
        g.progress = 0;

        // Eaten ghost returning to house
        if (g.eaten) {
            if (g.col === 10 && g.row === 11) {
                g.eaten = false; g.frightened = false;
                g.inHouse = true; g.exitDelay = 2000;
            }
        }

        // Choose next direction
        chooseGhostDir(g);
    }
}

function chooseGhostDir(g) {
    const DIRS = [{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}];
    const opp = {x:-g.dirX, y:-g.dirY};

    // Valid moves (no reverse, no walls)
    const valid = DIRS.filter(d => {
        if (d.x === opp.x && d.y === opp.y) return false;
        const nc = wrapCol(g.col + d.x);
        const nr = g.row + d.y;
        return !isBlockedForGhost(nc, nr, g.inHouse);
    });

    if (valid.length === 0) {
        // Forced to reverse
        const rev = {x:-g.dirX, y:-g.dirY};
        const nc = wrapCol(g.col + rev.x);
        const nr = g.row + rev.y;
        if (!isBlockedForGhost(nc, nr, false)) {
            g.dirX = rev.x; g.dirY = rev.y;
            g.nextCol = nc; g.nextRow = nr;
        } else {
            g.nextCol = g.col; g.nextRow = g.row; g.progress = 1;
        }
        return;
    }

    let chosen;

    if (g.frightened && !g.eaten) {
        chosen = valid[Math.floor(Math.random() * valid.length)];
    } else if (g.eaten) {
        // Head back to ghost house
        const target = {col:10, row:11};
        chosen = bestDir(g, valid, target.col, target.row);
    } else {
        // Chase target
        const target = getGhostTarget(g);
        chosen = bestDir(g, valid, target.col, target.row);
    }

    g.dirX = chosen.x; g.dirY = chosen.y;
    g.nextCol = wrapCol(g.col + chosen.x);
    g.nextRow = g.row + chosen.y;
}

function bestDir(g, valid, tc, tr) {
    let best = null, bestDist = Infinity;
    for (const d of valid) {
        const nc = wrapCol(g.col + d.x);
        const nr = g.row + d.y;
        const dist = (nc - tc) ** 2 + (nr - tr) ** 2;
        if (dist < bestDist) { bestDist = dist; best = d; }
    }
    return best || valid[0];
}

function getGhostTarget(g) {
    switch (g.name) {
        case 'Blinky': return { col: pacman.col, row: pacman.row };
        case 'Pinky':  return { col: wrapCol(pacman.col + pacman.dirX * 4), row: pacman.row + pacman.dirY * 4 };
        case 'Inky':   return { col: wrapCol(COLS - 1 - pacman.col), row: pacman.row };
        default: {
            const d2 = (g.col - pacman.col)**2 + (g.row - pacman.row)**2;
            return d2 > 64 ? { col: pacman.col, row: pacman.row } : { col: 1, row: ROWS - 2 };
        }
    }
}

// ─── Collisions ───────────────────────────────────────────────────────────────
function checkCollisions() {
    if (gameState !== 'playing') return;
    const px = lerp(pacman.col, pacman.nextCol, pacman.progress);
    const py = lerp(pacman.row, pacman.nextRow, pacman.progress);

    for (const g of ghosts) {
        if (g.inHouse) continue;
        const gx = lerp(g.col, g.nextCol, g.progress);
        const gy = lerp(g.row, g.nextRow, g.progress);
        if (Math.hypot(px - gx, py - gy) < 0.7) {
            if (g.frightened && !g.eaten) {
                g.eaten = true; g.frightened = false;
                const bonus = [200,400,800,1600][Math.min(eatenThisFright, 3)];
                score += bonus; eatenThisFright++;
                if (score > hiScore) hiScore = score;
                updateHUD();
            } else if (!g.eaten) {
                gameState = 'dying';
                pacman.dead = true; pacman.deadAnim = 0;
            }
        }
    }
}

function lerp(a, b, t) { return a + (b - a) * t; }

// ─── Render ────────────────────────────────────────────────────────────────────
function render(ts) {
    const W = canvas.width, H = canvas.height;
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);

    drawMaze();
    drawDots(ts);
    drawPacman(ts);
    ghosts.forEach(g => drawGhost(g, ts));

    if (gameState === 'levelup') {
        ctx.fillStyle = 'rgba(0,0,0,0.55)';
        ctx.fillRect(0,0,W,H);
        ctx.fillStyle = '#f0c030';
        ctx.font = 'bold 32px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('LEVEL ' + level, W/2, H/2);
    }
}

function drawMaze() {
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            if (map[r][c] === 1) {
                ctx.fillStyle = '#1a1aff';
                ctx.fillRect(c*CELL, r*CELL, CELL, CELL);
                ctx.fillStyle = '#0000aa';
                ctx.fillRect(c*CELL+2, r*CELL+2, CELL-4, CELL-4);
            } else if (map[r][c] === 4) {
                ctx.fillStyle = '#ffb8ff';
                ctx.fillRect(c*CELL+1, r*CELL + CELL/2 - 2, CELL-2, 4);
            }
        }
    }
}

function drawDots(ts) {
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            const cx = c*CELL + CELL/2, cy = r*CELL + CELL/2;
            if (map[r][c] === 0) {
                ctx.fillStyle = '#ffb8ae';
                ctx.beginPath(); ctx.arc(cx, cy, 2.5, 0, Math.PI*2); ctx.fill();
            } else if (map[r][c] === 3) {
                const s = 3.5 + Math.sin(ts * 0.005) * 1.5;
                ctx.fillStyle = '#ffb8ae';
                ctx.shadowColor = '#ff8866'; ctx.shadowBlur = 8;
                ctx.beginPath(); ctx.arc(cx, cy, s, 0, Math.PI*2); ctx.fill();
                ctx.shadowBlur = 0;
            }
        }
    }
}

function drawPacman(ts) {
    const pm = pacman;

    // Interpolate position
    const px = (lerp(wrapCol(pm.col), pm.nextCol, pm.progress)) * CELL + CELL/2;
    const py = lerp(pm.row, pm.nextRow, pm.progress) * CELL + CELL/2;

    if (pm.dead) {
        const t = pm.deadAnim;
        const open = t * Math.PI;
        ctx.save(); ctx.translate(px, py);
        ctx.fillStyle = '#f0c030';
        ctx.beginPath();
        ctx.moveTo(0,0);
        ctx.arc(0,0,CELL/2-1, open, Math.PI*2 - open);
        ctx.closePath(); ctx.fill();
        ctx.restore();
        return;
    }

    // Mouth animation
    pm.mouthAngle += pm.mouthDir * 0.1;
    if (pm.mouthAngle >= 0.28) pm.mouthDir = -1;
    if (pm.mouthAngle <= 0.01) pm.mouthDir =  1;

    let rot = 0;
    if      (pm.dirX > 0) rot = 0;
    else if (pm.dirX < 0) rot = Math.PI;
    else if (pm.dirY > 0) rot = Math.PI / 2;
    else if (pm.dirY < 0) rot = -Math.PI / 2;

    const open = pm.mouthAngle * Math.PI;
    ctx.save();
    ctx.translate(px, py); ctx.rotate(rot);
    ctx.fillStyle = '#f0c030';
    ctx.shadowColor = '#f0c030'; ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.arc(0,0, CELL/2-1, open, Math.PI*2 - open);
    ctx.closePath(); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.restore();
}

function drawGhost(g, ts) {
    if (g.inHouse) return;

    const gx = lerp(g.col, g.nextCol, g.progress) * CELL + CELL/2;
    const gy = lerp(g.row, g.nextRow, g.progress) * CELL + CELL/2;
    const r = CELL/2 - 1;

    if (g.eaten) {
        // Just eyes
        drawGhostEyes(gx, gy, r, g.dirX, g.dirY);
        return;
    }

    let color;
    if (g.frightened) {
        const flash = frighTimer < 2000 && Math.floor(ts/250)%2 === 0;
        color = flash ? '#ffffff' : '#0000cc';
    } else {
        color = g.color;
    }

    ctx.save();
    ctx.fillStyle = color;
    ctx.shadowColor = color; ctx.shadowBlur = 5;

    // Body
    ctx.beginPath();
    ctx.arc(gx, gy - r*0.15, r, Math.PI, 0);
    ctx.lineTo(gx + r, gy + r * 0.85);
    const waveW = r * 2 / 3;
    for (let i = 3; i >= 0; i--) {
        const wx = gx + r - i * waveW;
        const wy = gy + r * 0.85 + (i % 2 === 0 ? r * 0.3 : 0);
        ctx.lineTo(wx, wy);
    }
    ctx.lineTo(gx - r, gy + r * 0.85);
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 0;

    if (g.frightened) {
        // Scared face
        const flash = frighTimer < 2000 && Math.floor(ts/250)%2 === 0;
        ctx.fillStyle = flash ? '#f0c030' : '#fff';
        ctx.font = `${r * 0.8}px Arial`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('~', gx, gy + r * 0.1);
    } else {
        drawGhostEyes(gx, gy, r, g.dirX, g.dirY);
    }
    ctx.restore();
}

function drawGhostEyes(x, y, r, dx, dy) {
    const ey = y - r * 0.15;
    [-0.35, 0.35].forEach(ox => {
        const ex = x + r * ox;
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.ellipse(ex, ey, r*0.28, r*0.35, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#00f';
        ctx.beginPath(); ctx.ellipse(ex + dx*r*0.12, ey + dy*r*0.12, r*0.13, r*0.18, 0, 0, Math.PI*2); ctx.fill();
    });
}

// ─── HUD ──────────────────────────────────────────────────────────────────────
function updateHUD() {
    document.getElementById('score-val').textContent = score;
    document.getElementById('hi-val').textContent    = hiScore;
    document.getElementById('level-val').textContent = level;
    const el = document.getElementById('lives-icons');
    el.innerHTML = Array(lives).fill('<span style="font-size:.9rem">🟡</span>').join('');
}

function showOverlay(title, body, btnText, btnFn) {
    const ov = document.getElementById('overlay');
    ov.querySelector('h2').textContent = title;
    ov.querySelector('p').textContent  = body;
    const btn = ov.querySelector('button');
    btn.textContent = btnText; btn.onclick = btnFn;
    ov.style.display = '';
}

// ─── Input ────────────────────────────────────────────────────────────────────
const KEY_DIR = {
    ArrowLeft:{x:-1,y:0}, ArrowRight:{x:1,y:0},
    ArrowUp:{x:0,y:-1},   ArrowDown:{x:0,y:1},
    a:{x:-1,y:0}, d:{x:1,y:0}, w:{x:0,y:-1}, s:{x:0,y:1},
    A:{x:-1,y:0}, D:{x:1,y:0}, W:{x:0,y:-1}, S:{x:0,y:1},
};

document.addEventListener('keydown', e => {
    const d = KEY_DIR[e.key];
    if (d) { e.preventDefault(); pacman.queueX = d.x; pacman.queueY = d.y; }
});

document.getElementById('btn-up').addEventListener('click',    () => { pacman.queueX=0;  pacman.queueY=-1; });
document.getElementById('btn-down').addEventListener('click',  () => { pacman.queueX=0;  pacman.queueY=1;  });
document.getElementById('btn-left').addEventListener('click',  () => { pacman.queueX=-1; pacman.queueY=0;  });
document.getElementById('btn-right').addEventListener('click', () => { pacman.queueX=1;  pacman.queueY=0;  });

let swipeX, swipeY;
canvas.addEventListener('touchstart', e => { swipeX=e.touches[0].clientX; swipeY=e.touches[0].clientY; e.preventDefault(); }, {passive:false});
canvas.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - swipeX;
    const dy = e.changedTouches[0].clientY - swipeY;
    if (Math.abs(dx) > Math.abs(dy)) { pacman.queueX = dx>0?1:-1; pacman.queueY = 0; }
    else                              { pacman.queueX = 0; pacman.queueY = dy>0?1:-1; }
    e.preventDefault();
}, {passive:false});

// Initial draw
hiScore = 0;
ctx.fillStyle = '#000';
ctx.fillRect(0, 0, canvas.width, canvas.height);
</script>
</body>
</html>
