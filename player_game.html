<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paper Airplane</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f4f6fb;
            color: #1a1a2e;
        }
        header {
            background: linear-gradient(135deg, #dca50c 0%, #f0c030 100%);
            color: white;
            text-align: center;
            padding: 2.5rem 1rem 2rem;
            box-shadow: 0 4px 12px rgba(220,165,12,0.35);
        }
        header h1 {
            font-size: 2.4rem;
            font-weight: 800;
            letter-spacing: 1px;
            text-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }
        nav {
            display: flex;
            justify-content: center;
            gap: 0.25rem;
            background: #172ab3;
            padding: 0 1rem;
            box-shadow: 0 2px 8px rgba(23,42,179,0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        nav a {
            color: white;
            padding: 14px 22px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            border-bottom: 3px solid transparent;
            transition: background 0.2s, border-color 0.2s;
        }
        nav a:hover {
            background: rgba(255,255,255,0.12);
            border-bottom-color: #dca50c;
        }
        section {
            padding: 20px;
            margin: 20px;
        }
        footer {
            background: linear-gradient(135deg, #172ab3 0%, #1e3ae0 100%);
            color: rgba(255,255,255,0.85);
            text-align: center;
            padding: 1rem;
            font-size: 0.85rem;
            position: fixed;
            bottom: 0;
            width: 100%;
            box-shadow: 0 -2px 10px rgba(23,42,179,0.25);
        }
        footer span { color: #dca50c; font-weight: 600; }
    </style>
</head>
<body>
    <header>
        <h1>2 Player Game</h1>
    </header>
    <nav>
        <a href="index.html">Go Back</a>
    </nav>
    <section>
        <h2>2 Player Game</h2>
        <p>pull a friend   
        team work prison run
    dog walk</p>
    </section>
    <footer>
        &copy; 2025 <span>Davide Kurek</span>. All rights reserved.
    </footer>
</body>
</html>
