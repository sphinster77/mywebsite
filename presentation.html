<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presentation Maker — Workshop</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0d0f1a;
            color: #e8e8e8;
            min-height: 100vh;
        }

        a.back-link {
            position: fixed;
            top: 1rem; left: 1rem;
            color: #f0c030;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.85rem;
            opacity: 0.6;
            transition: opacity 0.2s;
            z-index: 100;
        }
        a.back-link:hover { opacity: 1; }

        /* ── Lock screen ── */
        #screen-lock {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 5rem 1.25rem 2.5rem;
        }

        .lock-box {
            background: #12152a;
            border: 1px solid #252844;
            border-radius: 16px;
            padding: 2.25rem 2rem;
            width: 100%;
            max-width: 360px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.25rem;
            text-align: center;
        }
        .lock-icon { font-size: 2.5rem; line-height: 1; }
        .lock-box h2 { font-size: 1.4rem; font-weight: 800; color: #f0c030; }
        .lock-box p { color: #6666aa; font-size: 0.85rem; }
        .lock-row { display: flex; gap: 0.5rem; width: 100%; }
        .lock-error { color: #e05050; font-size: 0.82rem; min-height: 1.1em; }

        /* ── Generator screen ── */
        #screen-gen {
            display: none;
            min-height: 100vh;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 5rem 1.25rem 2.5rem;
        }
        #screen-gen.active { display: flex; }

        .gen-header { text-align: center; margin-bottom: 1.75rem; }
        .gen-header h1 { font-size: 2rem; font-weight: 800; color: #f0c030; letter-spacing: -0.03em; }
        .gen-header p { color: #6666aa; font-size: 0.9rem; margin-top: 0.35rem; }

        .gen-form {
            background: #12152a;
            border: 1px solid #252844;
            border-radius: 16px;
            padding: 2rem;
            width: 100%;
            max-width: 580px;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .field { display: flex; flex-direction: column; gap: 0.4rem; }
        .field label {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #6666aa;
        }

        input, textarea, select {
            background: #1c1f38;
            border: 1px solid #252844;
            border-radius: 8px;
            color: #e8e8e8;
            padding: 0.6rem 0.85rem;
            font-size: 0.9rem;
            font-family: inherit;
            outline: none;
            width: 100%;
            transition: border-color 0.2s;
        }
        input:focus, textarea:focus, select:focus { border-color: #f0c030; }
        textarea { resize: vertical; min-height: 80px; }
        select option { background: #1c1f38; }

        .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; }

        .btn-gold {
            background: #f0c030;
            color: #0d0f1a;
            border: none;
            border-radius: 10px;
            padding: 0.7rem 1.5rem;
            font-size: 0.95rem;
            font-weight: 800;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            white-space: nowrap;
        }
        .btn-gold:hover { background: #e0b020; }
        .btn-gold:active { transform: scale(0.97); }

        .btn-gen {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.85rem 2rem;
            font-size: 1rem;
        }

        /* ── Presentation screen ── */
        #screen-pres {
            display: none;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        #screen-pres.active { display: flex; }

        .toolbar {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.55rem 0.85rem;
            background: #0d0f1a;
            border-bottom: 1px solid #1a1d36;
            flex-shrink: 0;
            flex-wrap: wrap;
        }
        .tb-btn {
            background: #1c1f38;
            border: 1px solid #252844;
            color: #b0b0cc;
            border-radius: 7px;
            padding: 0.38rem 0.75rem;
            font-size: 0.78rem;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.15s;
        }
        .tb-btn:hover { background: #252844; color: #f0c030; border-color: #f0c030; }
        .tb-btn.on { background: #f0c030; color: #0d0f1a; border-color: #f0c030; font-weight: 700; }
        .tb-sep { width: 1px; height: 20px; background: #252844; margin: 0 0.1rem; flex-shrink: 0; }
        .tb-space { flex: 1; }
        .tb-counter { color: #5050aa; font-size: 0.8rem; min-width: 64px; text-align: center; }

        .slide-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding: 1.25rem;
            overflow: hidden;
        }
        .nav-btn {
            background: #1c1f38;
            border: 1px solid #252844;
            color: #5050aa;
            border-radius: 50%;
            width: 40px; height: 40px;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            transition: all 0.15s;
        }
        .nav-btn:hover:not(:disabled) { background: #252844; color: #f0c030; border-color: #f0c030; }
        .nav-btn:disabled { opacity: 0.18; cursor: default; }

        .slide-wrapper {
            flex: 1;
            max-width: 880px;
            aspect-ratio: 16/9;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 16px 48px rgba(0,0,0,0.55);
        }

        .slide {
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 7%;
            position: relative;
        }
        .slide.center { align-items: center; text-align: center; }

        .slide-title { font-weight: 800; line-height: 1.2; }
        .slide.center .slide-title { font-size: clamp(1.4rem, 4.5vw, 3rem); margin-bottom: 0.9rem; }
        .slide:not(.center) .slide-title { font-size: clamp(1.1rem, 3vw, 2rem); margin-bottom: 1.2rem; }

        .slide-sub { opacity: 0.65; max-width: 76%; font-size: clamp(0.85rem, 2vw, 1.15rem); line-height: 1.55; }
        .slide.center .slide-sub { margin: 0 auto; }

        .slide-bullets { list-style: none; display: flex; flex-direction: column; gap: 0.65rem; }
        .slide-bullets li {
            display: flex; align-items: flex-start; gap: 0.7rem;
            font-size: clamp(0.75rem, 1.8vw, 0.97rem);
            line-height: 1.55;
        }
        .bullet-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 0.55em; }
        .slide-num { position: absolute; bottom: 1.2rem; right: 1.8rem; font-size: 0.7rem; opacity: 0.22; }

        .dot-nav { display: flex; justify-content: center; gap: 0.45rem; padding: 0.6rem; flex-shrink: 0; }
        .dot { width: 7px; height: 7px; border-radius: 50%; background: #252844; cursor: pointer; transition: all 0.2s; }
        .dot.on { width: 22px; border-radius: 4px; background: #f0c030; }

        [contenteditable="true"] { cursor: text; outline: none; }
        [contenteditable="true"]:focus { outline: 2px solid rgba(240,192,48,0.45); border-radius: 3px; outline-offset: 2px; }
        .edit-hint {
            position: fixed; bottom: 3.5rem; left: 50%; transform: translateX(-50%);
            background: rgba(240,192,48,0.12); border: 1px solid rgba(240,192,48,0.3);
            color: #f0c030; font-size: 0.75rem; padding: 0.35rem 0.85rem;
            border-radius: 20px; pointer-events: none; display: none;
        }

        /* ── Fullscreen ── */
        #fs { display: none; position: fixed; inset: 0; z-index: 9000; flex-direction: column; align-items: center; justify-content: center; }
        #fs.active { display: flex; }

        .fs-slide { width: 100vw; height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 8%; position: relative; }
        .fs-slide.center { align-items: center; text-align: center; }

        .fs-title { font-weight: 800; line-height: 1.2; }
        .fs-slide.center .fs-title { font-size: clamp(2rem, 6vw, 4.5rem); margin-bottom: 1.2rem; }
        .fs-slide:not(.center) .fs-title { font-size: clamp(1.5rem, 4vw, 3rem); margin-bottom: 1.5rem; }

        .fs-sub { opacity: 0.65; max-width: 70%; font-size: clamp(1rem, 2.5vw, 1.6rem); line-height: 1.5; }
        .fs-slide.center .fs-sub { margin: 0 auto; }

        .fs-bullets { list-style: none; display: flex; flex-direction: column; gap: 1rem; }
        .fs-bullets li { display: flex; align-items: flex-start; gap: 1rem; font-size: clamp(1rem, 2.2vw, 1.4rem); line-height: 1.5; }
        .fs-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 0.55em; }
        .fs-num { position: absolute; bottom: 1.5rem; right: 2.5rem; font-size: 0.85rem; opacity: 0.2; }

        .fs-controls { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); display: flex; gap: 0.6rem; opacity: 0; transition: opacity 0.3s; }
        #fs:hover .fs-controls { opacity: 1; }
        .fs-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.8); border-radius: 8px; padding: 0.4rem 0.9rem; font-size: 0.8rem; cursor: pointer; transition: background 0.2s; }
        .fs-btn:hover { background: rgba(255,255,255,0.18); }

        /* ── Print ── */
        #print-view { display: none; }
        @media print {
            a.back-link, #screen-lock, #screen-gen, #screen-pres, #fs, .edit-hint { display: none !important; }
            #print-view { display: block !important; }
            body { background: white !important; }
            .p-slide { width: 100%; height: 100vh; page-break-after: always; display: flex; flex-direction: column; justify-content: center; padding: 10%; position: relative; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            .p-slide.center { align-items: center; text-align: center; }
            .p-title { font-weight: 800; line-height: 1.2; }
            .p-slide.center .p-title { font-size: 48pt; margin-bottom: 18pt; }
            .p-slide:not(.center) .p-title { font-size: 32pt; margin-bottom: 24pt; }
            .p-sub { opacity: 0.65; max-width: 76%; font-size: 16pt; line-height: 1.5; }
            .p-slide.center .p-sub { margin: 0 auto; }
            .p-bullets { list-style: none; display: flex; flex-direction: column; gap: 12pt; }
            .p-bullets li { display: flex; align-items: flex-start; gap: 10pt; font-size: 14pt; line-height: 1.5; }
            .p-bdot { width: 8pt; height: 8pt; border-radius: 50%; flex-shrink: 0; margin-top: 5pt; }
            .p-accent { position: absolute; }
            .p-slide.center .p-accent { bottom: 0; left: 0; right: 0; width: 100%; height: 5pt; }
            .p-slide:not(.center) .p-accent { top: 0; left: 0; bottom: 0; width: 6pt; height: 100%; }
            .p-num { position: absolute; bottom: 20pt; right: 30pt; font-size: 9pt; opacity: 0.25; }
        }
    </style>
</head>
<body>

<a class="back-link" href="index.html">← Back</a>

<!-- ── Lock screen ── -->
<div id="screen-lock">
    <div class="lock-box">
        <div class="lock-icon">🎤</div>
        <h2>Presentation Maker</h2>
        <p>Enter the password to continue.</p>
        <div class="lock-row">
            <input id="pw-input" type="password" placeholder="Password" autocomplete="off"
                onkeydown="if(event.key==='Enter')checkPassword()">
            <button class="btn-gold" onclick="checkPassword()">Unlock</button>
        </div>
        <span class="lock-error" id="pw-error"></span>
    </div>
</div>

<!-- ── Generator screen ── -->
<div id="screen-gen">
    <div class="gen-header">
        <h1>Presentation Maker</h1>
        <p>Describe your topic and we'll build the slides.</p>
    </div>
    <form class="gen-form" onsubmit="generate(event)">
        <div class="field">
            <label>Topic / Prompt</label>
            <textarea id="topic" placeholder="e.g. The history of the Roman Empire, Benefits of daily exercise, How solar panels work…" rows="3"></textarea>
        </div>
        <div class="row3">
            <div class="field">
                <label>Slides</label>
                <input id="num-slides" type="number" value="8" min="4" max="16">
            </div>
            <div class="field">
                <label>Tone</label>
                <select id="tone">
                    <option>Professional</option>
                    <option>Educational</option>
                    <option>Casual</option>
                    <option>Inspiring</option>
                </select>
            </div>
            <div class="field">
                <label>Theme</label>
                <select id="theme-gen">
                    <option value="dark">Dark (Gold)</option>
                    <option value="ocean">Ocean</option>
                    <option value="forest">Forest</option>
                    <option value="sunset">Sunset</option>
                    <option value="light">Light</option>
                </select>
            </div>
        </div>
        <button class="btn-gold btn-gen" type="submit">✨ Build Presentation</button>
    </form>
</div>

<!-- ── Presentation screen ── -->
<div id="screen-pres">
    <div class="toolbar">
        <button class="tb-btn" onclick="goBack()">← New</button>
        <div class="tb-sep"></div>
        <button class="tb-btn" id="tb-edit" onclick="toggleEdit()">✏️ Edit</button>
        <button class="tb-btn" onclick="present()">▶ Present</button>
        <button class="tb-btn" onclick="printSlides()">🖨 Print</button>
        <div class="tb-sep"></div>
        <select class="tb-btn" id="theme-pres" onchange="applyTheme(this.value)" style="padding:0.38rem 0.5rem;">
            <option value="dark">Dark</option>
            <option value="ocean">Ocean</option>
            <option value="forest">Forest</option>
            <option value="sunset">Sunset</option>
            <option value="light">Light</option>
        </select>
        <div class="tb-space"></div>
        <span class="tb-counter" id="tb-counter">1 / 1</span>
    </div>
    <div class="slide-area">
        <button class="nav-btn" id="btn-prev" onclick="nav(-1)" disabled>‹</button>
        <div class="slide-wrapper">
            <div class="slide" id="main-slide"></div>
        </div>
        <button class="nav-btn" id="btn-next" onclick="nav(1)">›</button>
    </div>
    <div class="dot-nav" id="dots"></div>
</div>
<div class="edit-hint" id="edit-hint">Click any text to edit it</div>

<!-- ── Fullscreen ── -->
<div id="fs">
    <div class="fs-slide" id="fs-slide"></div>
    <div class="fs-controls">
        <button class="fs-btn" onclick="fsNav(-1)">‹ Prev</button>
        <span style="color:rgba(255,255,255,0.4);font-size:0.8rem;line-height:2.2" id="fs-counter"></span>
        <button class="fs-btn" onclick="fsNav(1)">Next ›</button>
        <button class="fs-btn" onclick="exitFs()">✕ Exit</button>
    </div>
</div>

<div id="print-view"></div>

<script>
// ── Password ──────────────────────────────────────────────────────────────────
const PASSWORD = '67';

function checkPassword() {
    if (document.getElementById('pw-input').value === PASSWORD) {
        document.getElementById('screen-lock').style.display = 'none';
        document.getElementById('screen-gen').classList.add('active');
        document.getElementById('topic').focus();
    } else {
        document.getElementById('pw-error').textContent = 'Wrong password.';
        document.getElementById('pw-input').value = '';
        document.getElementById('pw-input').focus();
    }
}

// ── Themes ────────────────────────────────────────────────────────────────────
const themes = {
    dark:   { bg:'#0d0f1a', slide:'#161828', accent:'#f0c030', title:'#f0c030', text:'#dde0f0', sub:'#8888c0', num:'#888' },
    ocean:  { bg:'#040d1c', slide:'#071a38', accent:'#22d3ee', title:'#7de8f8', text:'#c0dff0', sub:'#6090b0', num:'#336' },
    forest: { bg:'#050e07', slide:'#091a0d', accent:'#4ade80', title:'#7cf0a0', text:'#c0e8d0', sub:'#508060', num:'#363' },
    sunset: { bg:'#160905', slide:'#26100a', accent:'#fb923c', title:'#fdb070', text:'#f0d0c0', sub:'#a06040', num:'#864' },
    light:  { bg:'#e8ecf4', slide:'#ffffff', accent:'#2563eb', title:'#1e293b', text:'#334155', sub:'#64748b', num:'#aaa' },
};

// ── State ─────────────────────────────────────────────────────────────────────
let slides = [];
let idx = 0;
let theme = 'dark';
let editMode = false;

// ── Keyboard nav ──────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
    if (document.getElementById('fs').classList.contains('active')) {
        if (e.key === 'ArrowRight' || e.key === 'ArrowDown') fsNav(1);
        else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') fsNav(-1);
        else if (e.key === 'Escape') exitFs();
    } else if (document.getElementById('screen-pres').classList.contains('active')) {
        if (!editMode) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') nav(1);
            else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') nav(-1);
            else if (e.key === 'f' || e.key === 'F') present();
        }
    }
});

// ── Template engine ───────────────────────────────────────────────────────────
const toneSubtitles = {
    Professional: 'A structured overview for professionals',
    Educational:  'An educational guide for learners',
    Casual:       'A friendly look at the topic',
    Inspiring:    'Ideas and insights to inspire action',
};

const toneConclusions = {
    Professional: 'Applying these insights drives measurable results',
    Educational:  'Understanding this topic opens new possibilities',
    Casual:       'There you have it — hope this was useful!',
    Inspiring:    'The time to act on this knowledge is now',
};

const slidePool = [
    {
        title: t => `What is ${cap(t)}?`,
        bullets: t => [
            `${cap(t)} is a broad and important concept with real-world impact`,
            `It encompasses a range of ideas, methods, and practices`,
            `Understanding it starts with exploring its core definition`,
            `It affects people, systems, and industries in meaningful ways`,
        ],
    },
    {
        title: () => 'Background & Origins',
        bullets: t => [
            `The roots of ${t} stretch back further than most people realise`,
            `Early developments laid the groundwork for what we see today`,
            `Key milestones shaped how we think about and use ${t}`,
            `Historical context helps explain its current state and direction`,
        ],
    },
    {
        title: t => `Core Principles of ${cap(t)}`,
        bullets: t => [
            `A clear framework helps organise how ${t} is understood`,
            `The first principle focuses on foundations and fundamentals`,
            `Building on that, structure and process play central roles`,
            `Consistency and clarity tie the whole system together`,
        ],
    },
    {
        title: () => 'How It Works',
        bullets: t => [
            `The process begins with identifying the key inputs and goals`,
            `Each stage of ${t} builds on the previous one`,
            `Core mechanisms drive outcomes in a predictable, repeatable way`,
            `The result is a reliable system that delivers consistent value`,
        ],
    },
    {
        title: () => 'Key Benefits',
        bullets: t => [
            `${cap(t)} offers significant advantages when applied correctly`,
            `It saves time, reduces effort, and improves outcomes`,
            `Real-world results demonstrate clear and measurable value`,
            `Both individuals and organisations stand to gain from it`,
        ],
    },
    {
        title: () => 'Real-World Applications',
        bullets: t => [
            `${cap(t)} appears across industries including education, business, and science`,
            `Everyday examples show how it solves genuine problems`,
            `Case studies highlight successful outcomes at scale`,
            `The range of applications continues to expand over time`,
        ],
    },
    {
        title: () => 'Challenges to Consider',
        bullets: t => [
            `Like any topic, ${t} comes with its own set of challenges`,
            `Common obstacles include complexity, cost, and resistance to change`,
            `Awareness of these challenges leads to better planning`,
            `With the right approach, most hurdles can be overcome`,
        ],
    },
    {
        title: t => `The Future of ${cap(t)}`,
        bullets: t => [
            `Trends suggest ${t} will continue to evolve rapidly`,
            `Emerging technologies are opening new possibilities`,
            `The next decade promises significant developments in this space`,
            `Staying informed positions you ahead of the curve`,
        ],
    },
    {
        title: () => 'Best Practices',
        bullets: t => [
            `Start with a clear understanding of your goals around ${t}`,
            `Apply proven methods rather than reinventing the wheel`,
            `Consistency and iteration are key to long-term success`,
            `Learn from others who have already navigated this path`,
        ],
    },
    {
        title: () => 'Common Misconceptions',
        bullets: t => [
            `Many people misunderstand what ${t} actually involves`,
            `It is not as complicated — or as simple — as often assumed`,
            `Separating fact from fiction leads to better decisions`,
            `Addressing these myths builds a stronger foundation`,
        ],
    },
    {
        title: () => 'Why It Matters',
        bullets: t => [
            `${cap(t)} plays a vital role in our daily lives and wider society`,
            `Its influence extends far beyond the obvious surface level`,
            `Ignoring it can lead to missed opportunities and avoidable problems`,
            `Embracing it with understanding makes a genuine difference`,
        ],
    },
    {
        title: () => 'Key Facts & Figures',
        bullets: t => [
            `Research consistently highlights the importance of ${t}`,
            `Studies show significant growth and interest in recent years`,
            `Data reveals patterns that inform smarter strategies`,
            `Numbers tell a compelling story about impact and scale`,
        ],
    },
];

function cap(str) {
    return str.charAt(0).toUpperCase() + str.slice(1);
}

function titleCase(str) {
    return str.replace(/\w\S*/g, w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase());
}

function buildSlides(topic, numSlides, tone) {
    const t = topic.toLowerCase().trim();
    const result = [];

    // Title slide
    result.push({
        type: 'title',
        title: titleCase(topic),
        subtitle: toneSubtitles[tone] || toneSubtitles.Professional,
    });

    // Pick content slides from pool (shuffle deterministically based on topic length)
    const contentCount = numSlides - 2;
    const pool = [...slidePool];
    // Simple deterministic shuffle seeded by topic string
    const seed = [...topic].reduce((a, c) => a + c.charCodeAt(0), 0);
    for (let i = pool.length - 1; i > 0; i--) {
        const j = (seed * (i + 1)) % (i + 1);
        [pool[i], pool[j]] = [pool[j], pool[i]];
    }

    for (let i = 0; i < contentCount; i++) {
        const tpl = pool[i % pool.length];
        result.push({
            type: 'content',
            title: tpl.title(t),
            bullets: tpl.bullets(t),
        });
    }

    // Conclusion slide
    result.push({
        type: 'conclusion',
        title: 'Key Takeaways',
        subtitle: toneConclusions[tone] || toneConclusions.Professional,
    });

    return result;
}

// ── Generate ──────────────────────────────────────────────────────────────────
function generate(e) {
    e.preventDefault();
    const topic = document.getElementById('topic').value.trim();
    const n     = Math.max(4, Math.min(16, parseInt(document.getElementById('num-slides').value) || 8));
    const tone  = document.getElementById('tone').value;
    theme       = document.getElementById('theme-gen').value;

    if (!topic) return;

    slides = buildSlides(topic, n, tone);
    idx = 0;
    launchPresentation();
}

// ── Launch ────────────────────────────────────────────────────────────────────
function launchPresentation() {
    document.getElementById('screen-gen').classList.remove('active');
    document.getElementById('screen-pres').classList.add('active');
    document.getElementById('theme-pres').value = theme;
    buildDots();
    renderSlide();
}

function goBack() {
    document.getElementById('screen-pres').classList.remove('active');
    document.getElementById('screen-gen').classList.add('active');
    exitEditMode();
}

// ── Theme ─────────────────────────────────────────────────────────────────────
function applyTheme(t) {
    theme = t;
    renderSlide();
    document.getElementById('theme-pres').value = t;
}

// ── Render slide ──────────────────────────────────────────────────────────────
function renderSlide() {
    const s  = slides[idx];
    const th = themes[theme];
    const el = document.getElementById('main-slide');

    el.style.background = th.slide;
    document.getElementById('screen-pres').style.background = th.bg;

    const isCenter = (s.type === 'title' || s.type === 'conclusion');
    el.className = 'slide' + (isCenter ? ' center' : '');

    const acS = isCenter
        ? `bottom:0;left:0;right:0;width:100%;height:4px`
        : `top:0;left:0;bottom:0;width:5px;height:100%`;

    if (isCenter) {
        el.innerHTML = `
            <div style="position:absolute;background:${th.accent};${acS}"></div>
            <h1 class="slide-title" style="color:${th.title}" ${editMode?'contenteditable="true"':''}>${esc(s.title)}</h1>
            <p class="slide-sub" style="color:${th.sub}" ${editMode?'contenteditable="true"':''}>${esc(s.subtitle||'')}</p>
            <span class="slide-num" style="color:${th.num}">${idx+1} / ${slides.length}</span>`;
    } else {
        const bHTML = (s.bullets||[]).map(b =>
            `<li><span class="bullet-dot" style="background:${th.accent}"></span><span ${editMode?'contenteditable="true"':''}>${esc(b)}</span></li>`
        ).join('');
        el.innerHTML = `
            <div style="position:absolute;background:${th.accent};${acS}"></div>
            <h2 class="slide-title" style="color:${th.title}" ${editMode?'contenteditable="true"':''}>${esc(s.title)}</h2>
            <ul class="slide-bullets" style="color:${th.text}">${bHTML}</ul>
            <span class="slide-num" style="color:${th.num}">${idx+1} / ${slides.length}</span>`;
    }

    updateNav();
}

function esc(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Edit mode ─────────────────────────────────────────────────────────────────
function toggleEdit() {
    editMode = !editMode;
    const btn  = document.getElementById('tb-edit');
    const hint = document.getElementById('edit-hint');
    if (editMode) { btn.classList.add('on'); hint.style.display = 'block'; }
    else { saveEditedSlide(); btn.classList.remove('on'); hint.style.display = 'none'; }
    renderSlide();
}

function exitEditMode() {
    if (!editMode) return;
    editMode = false;
    document.getElementById('tb-edit').classList.remove('on');
    document.getElementById('edit-hint').style.display = 'none';
}

function saveEditedSlide() {
    const s  = slides[idx];
    const el = document.getElementById('main-slide');
    const title = el.querySelector('.slide-title');
    if (title) s.title = title.innerText;
    if (s.type === 'title' || s.type === 'conclusion') {
        const sub = el.querySelector('.slide-sub');
        if (sub) s.subtitle = sub.innerText;
    } else {
        const spans = el.querySelectorAll('.slide-bullets li > span:last-child');
        s.bullets = Array.from(spans).map(sp => sp.innerText);
    }
}

// ── Navigation ────────────────────────────────────────────────────────────────
function nav(d) {
    if (editMode) saveEditedSlide();
    const next = idx + d;
    if (next < 0 || next >= slides.length) return;
    idx = next;
    renderSlide();
    highlightDot();
}

function updateNav() {
    document.getElementById('btn-prev').disabled = idx === 0;
    document.getElementById('btn-next').disabled = idx === slides.length - 1;
    document.getElementById('tb-counter').textContent = `${idx+1} / ${slides.length}`;
}

function buildDots() {
    document.getElementById('dots').innerHTML = slides.map((_, i) =>
        `<span class="dot${i===0?' on':''}" onclick="jumpTo(${i})"></span>`
    ).join('');
}

function jumpTo(i) {
    if (editMode) saveEditedSlide();
    idx = i;
    renderSlide();
    highlightDot();
}

function highlightDot() {
    document.querySelectorAll('.dot').forEach((d,i) => d.classList.toggle('on', i===idx));
}

// ── Fullscreen ────────────────────────────────────────────────────────────────
function present() {
    if (editMode) { saveEditedSlide(); exitEditMode(); renderSlide(); }
    renderFsSlide();
    document.getElementById('fs').classList.add('active');
}

function exitFs() { document.getElementById('fs').classList.remove('active'); }

function fsNav(d) {
    const next = idx + d;
    if (next < 0 || next >= slides.length) return;
    idx = next;
    renderFsSlide();
    highlightDot();
    updateNav();
}

function renderFsSlide() {
    const s  = slides[idx];
    const th = themes[theme];
    const el = document.getElementById('fs-slide');

    el.style.background = th.slide;
    document.getElementById('fs').style.background = th.bg;

    const isCenter = (s.type === 'title' || s.type === 'conclusion');
    el.className = 'fs-slide' + (isCenter ? ' center' : '');
    const acS = isCenter
        ? `bottom:0;left:0;right:0;width:100%;height:5px`
        : `top:0;left:0;bottom:0;width:7px;height:100%`;

    if (isCenter) {
        el.innerHTML = `
            <div style="position:absolute;background:${th.accent};${acS}"></div>
            <h1 class="fs-title" style="color:${th.title}">${esc(s.title)}</h1>
            <p class="fs-sub" style="color:${th.sub}">${esc(s.subtitle||'')}</p>
            <span class="fs-num" style="color:${th.num}">${idx+1} / ${slides.length}</span>`;
    } else {
        const bHTML = (s.bullets||[]).map(b =>
            `<li><span class="fs-dot" style="background:${th.accent}"></span><span style="color:${th.text}">${esc(b)}</span></li>`
        ).join('');
        el.innerHTML = `
            <div style="position:absolute;background:${th.accent};${acS}"></div>
            <h2 class="fs-title" style="color:${th.title}">${esc(s.title)}</h2>
            <ul class="fs-bullets">${bHTML}</ul>
            <span class="fs-num" style="color:${th.num}">${idx+1} / ${slides.length}</span>`;
    }

    document.getElementById('fs-counter').textContent = `${idx+1} / ${slides.length}`;
}

// ── Print ─────────────────────────────────────────────────────────────────────
function printSlides() {
    if (editMode) { saveEditedSlide(); exitEditMode(); renderSlide(); }
    const th = themes[theme];
    const pv = document.getElementById('print-view');
    pv.innerHTML = slides.map((s, i) => {
        const isCenter = (s.type === 'title' || s.type === 'conclusion');
        let inner = '';
        if (isCenter) {
            inner = `
                <div class="p-accent" style="background:${th.accent};bottom:0;left:0;right:0;width:100%;height:5pt"></div>
                <h1 class="p-title" style="color:${th.title}">${esc(s.title)}</h1>
                <p class="p-sub" style="color:${th.sub}">${esc(s.subtitle||'')}</p>`;
        } else {
            const bHTML = (s.bullets||[]).map(b =>
                `<li><span class="p-bdot" style="background:${th.accent}"></span><span style="color:${th.text}">${esc(b)}</span></li>`
            ).join('');
            inner = `
                <div class="p-accent" style="background:${th.accent};top:0;left:0;bottom:0;width:6pt;height:100%"></div>
                <h2 class="p-title" style="color:${th.title}">${esc(s.title)}</h2>
                <ul class="p-bullets">${bHTML}</ul>`;
        }
        return `<div class="p-slide${isCenter?' center':''}" style="background:${th.slide}">
            ${inner}
            <span class="p-num" style="color:${th.num}">${i+1} / ${slides.length}</span>
        </div>`;
    }).join('');
    window.print();
}
</script>
</body>
</html>
