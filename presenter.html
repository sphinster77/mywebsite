<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presenter — Workshop</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #0d0f1a; color: #e8e8e8; min-height: 100vh; }

        a.back-link {
            position: fixed; top: 1rem; left: 1rem;
            color: #f0c030; text-decoration: none; font-weight: 700; font-size: 0.85rem;
            opacity: 0.6; transition: opacity 0.2s; z-index: 100;
        }
        a.back-link:hover { opacity: 1; }

        /* Lock */
        #screen-lock {
            min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 5rem 1.25rem 2.5rem;
        }
        .lock-box {
            background: #12152a; border: 1px solid #252844; border-radius: 16px;
            padding: 2.25rem 2rem; width: 100%; max-width: 360px;
            display: flex; flex-direction: column; align-items: center; gap: 1.25rem; text-align: center;
        }
        .lock-icon { font-size: 2.5rem; }
        .lock-box h2 { font-size: 1.4rem; font-weight: 800; color: #f0c030; }
        .lock-box p { color: #6666aa; font-size: 0.85rem; }
        .lock-row { display: flex; gap: 0.5rem; width: 100%; }
        .lock-error { color: #e05050; font-size: 0.82rem; min-height: 1.1em; }

        input {
            background: #1c1f38; border: 1px solid #252844; border-radius: 8px;
            color: #e8e8e8; padding: 0.6rem 0.85rem; font-size: 0.9rem;
            font-family: inherit; outline: none; width: 100%; transition: border-color 0.2s;
        }
        input:focus { border-color: #f0c030; }

        .btn-gold {
            background: #f0c030; color: #0d0f1a; border: none; border-radius: 10px;
            padding: 0.7rem 1.5rem; font-size: 0.95rem; font-weight: 800;
            cursor: pointer; transition: background 0.2s; white-space: nowrap;
        }
        .btn-gold:hover { background: #e0b020; }

        /* Presentation screen */
        #screen-pres { display: none; flex-direction: column; height: 100vh; overflow: hidden; }
        #screen-pres.active { display: flex; }

        .toolbar {
            display: flex; align-items: center; gap: 0.6rem;
            padding: 0.55rem 0.85rem; background: #0d0f1a;
            border-bottom: 1px solid #1a1d36; flex-shrink: 0; flex-wrap: wrap;
        }
        .tb-btn {
            background: #1c1f38; border: 1px solid #252844; color: #b0b0cc;
            border-radius: 7px; padding: 0.38rem 0.75rem; font-size: 0.78rem;
            cursor: pointer; white-space: nowrap; transition: all 0.15s;
        }
        .tb-btn:hover { background: #252844; color: #f0c030; border-color: #f0c030; }
        .tb-sep { width: 1px; height: 20px; background: #252844; margin: 0 0.1rem; flex-shrink: 0; }
        .tb-space { flex: 1; }
        .tb-counter { color: #5050aa; font-size: 0.8rem; min-width: 64px; text-align: center; }

        .slide-area {
            flex: 1; display: flex; align-items: center; justify-content: center;
            gap: 0.75rem; padding: 1.25rem; overflow: hidden;
        }
        .nav-btn {
            background: #1c1f38; border: 1px solid #252844; color: #5050aa;
            border-radius: 50%; width: 40px; height: 40px; font-size: 1.1rem;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; transition: all 0.15s;
        }
        .nav-btn:hover:not(:disabled) { background: #252844; color: #f0c030; border-color: #f0c030; }
        .nav-btn:disabled { opacity: 0.18; cursor: default; }

        .slide-wrapper {
            flex: 1; max-width: 880px; aspect-ratio: 16/9;
            border-radius: 10px; overflow: hidden; box-shadow: 0 16px 48px rgba(0,0,0,0.55);
        }
        .slide {
            width: 100%; height: 100%; display: flex; flex-direction: column;
            justify-content: center; padding: 7%; position: relative;
        }
        .slide.center { align-items: center; text-align: center; }
        .slide-title { font-weight: 800; line-height: 1.2; }
        .slide.center .slide-title { font-size: clamp(1.4rem, 4.5vw, 3rem); margin-bottom: 0.9rem; }
        .slide:not(.center) .slide-title { font-size: clamp(1.1rem, 3vw, 2rem); margin-bottom: 1.2rem; }
        .slide-sub { opacity: 0.65; max-width: 76%; font-size: clamp(0.85rem, 2vw, 1.15rem); line-height: 1.55; }
        .slide.center .slide-sub { margin: 0 auto; }
        .slide-bullets { list-style: none; display: flex; flex-direction: column; gap: 0.65rem; }
        .slide-bullets li { display: flex; align-items: flex-start; gap: 0.7rem; font-size: clamp(0.75rem, 1.8vw, 0.97rem); line-height: 1.55; }
        .bullet-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 0.55em; }
        .slide-num { position: absolute; bottom: 1.2rem; right: 1.8rem; font-size: 0.7rem; opacity: 0.22; }

        .dot-nav { display: flex; justify-content: center; gap: 0.45rem; padding: 0.6rem; flex-shrink: 0; }
        .dot { width: 7px; height: 7px; border-radius: 50%; background: #252844; cursor: pointer; transition: all 0.2s; }
        .dot.on { width: 22px; border-radius: 4px; background: #f0c030; }

        /* Task slide */
        .task-list { display: flex; flex-direction: column; gap: 0.55rem; width: 100%; }
        .task-row { display: flex; align-items: center; gap: 0.75rem; }
        .task-q { font-size: clamp(0.72rem, 1.7vw, 0.95rem); flex: 1; line-height: 1.4; }
        .task-a { font-weight: 800; font-size: clamp(0.72rem, 1.7vw, 0.95rem); min-width: 2.5rem; opacity: 0; transition: opacity 0.25s; }
        .task-a.shown { opacity: 1; }
        .task-hint { font-size: clamp(0.6rem, 1.2vw, 0.72rem); opacity: 0.4; margin-top: 0.6rem; }

        /* Fullscreen task */
        .fs-task-list { display: flex; flex-direction: column; gap: 1.1rem; width: 100%; }
        .fs-task-row { display: flex; align-items: center; gap: 1.2rem; }
        .fs-task-q { font-size: clamp(1rem, 2.2vw, 1.4rem); flex: 1; line-height: 1.4; }
        .fs-task-a { font-weight: 800; font-size: clamp(1rem, 2.2vw, 1.4rem); min-width: 3.5rem; opacity: 0; transition: opacity 0.25s; }
        .fs-task-a.shown { opacity: 1; }
        .fs-task-hint { font-size: clamp(0.75rem, 1.4vw, 0.95rem); opacity: 0.35; margin-top: 1rem; }

        /* Fullscreen */
        #fs { display: none; position: fixed; inset: 0; z-index: 9000; flex-direction: column; align-items: center; justify-content: center; }
        #fs.active { display: flex; }
        .fs-slide { width: 100vw; height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 8%; position: relative; }
        .fs-slide.center { align-items: center; text-align: center; }
        .fs-title { font-weight: 800; line-height: 1.2; }
        .fs-slide.center .fs-title { font-size: clamp(2rem, 6vw, 4.5rem); margin-bottom: 1.2rem; }
        .fs-slide:not(.center) .fs-title { font-size: clamp(1.5rem, 4vw, 3rem); margin-bottom: 1.5rem; }
        .fs-sub { opacity: 0.65; max-width: 70%; font-size: clamp(1rem, 2.5vw, 1.6rem); line-height: 1.5; }
        .fs-slide.center .fs-sub { margin: 0 auto; }
        .fs-bullets { list-style: none; display: flex; flex-direction: column; gap: 1rem; }
        .fs-bullets li { display: flex; align-items: flex-start; gap: 1rem; font-size: clamp(1rem, 2.2vw, 1.4rem); line-height: 1.5; }
        .fs-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 0.55em; }
        .fs-num { position: absolute; bottom: 1.5rem; right: 2.5rem; font-size: 0.85rem; opacity: 0.2; }
        .fs-controls { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); display: flex; gap: 0.6rem; opacity: 0; transition: opacity 0.3s; }
        #fs:hover .fs-controls { opacity: 1; }
        .fs-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.8); border-radius: 8px; padding: 0.4rem 0.9rem; font-size: 0.8rem; cursor: pointer; }
        .fs-btn:hover { background: rgba(255,255,255,0.18); }

        /* Print */
        #print-view { display: none; }
        @media print {
            a.back-link, #screen-lock, #screen-pres, #fs { display: none !important; }
            #print-view { display: block !important; }
            body { background: white !important; }
            .p-slide { width: 100%; height: 100vh; page-break-after: always; display: flex; flex-direction: column; justify-content: center; padding: 10%; position: relative; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            .p-slide.center { align-items: center; text-align: center; }
            .p-title { font-weight: 800; line-height: 1.2; }
            .p-slide.center .p-title { font-size: 48pt; margin-bottom: 18pt; }
            .p-slide:not(.center) .p-title { font-size: 32pt; margin-bottom: 24pt; }
            .p-sub { opacity: 0.65; max-width: 76%; font-size: 16pt; line-height: 1.5; }
            .p-slide.center .p-sub { margin: 0 auto; }
            .p-bullets { list-style: none; display: flex; flex-direction: column; gap: 12pt; }
            .p-bullets li { display: flex; align-items: flex-start; gap: 10pt; font-size: 14pt; line-height: 1.5; }
            .p-bdot { width: 8pt; height: 8pt; border-radius: 50%; flex-shrink: 0; margin-top: 5pt; }
            .p-accent { position: absolute; }
            .p-slide.center .p-accent { bottom: 0; left: 0; right: 0; width: 100%; height: 5pt; }
            .p-slide:not(.center) .p-accent { top: 0; left: 0; bottom: 0; width: 6pt; height: 100%; }
            .p-num { position: absolute; bottom: 20pt; right: 30pt; font-size: 9pt; opacity: 0.25; }
        }
    </style>
</head>
<body>

<a class="back-link" href="index.html">← Back</a>

<div id="screen-lock">
    <div class="lock-box">
        <div class="lock-icon">📽️</div>
        <h2>Presenter</h2>
        <p>Enter the password to present.</p>
        <div class="lock-row">
            <input id="pw-input" type="password" placeholder="Password" autocomplete="off"
                onkeydown="if(event.key==='Enter')checkPassword()">
            <button class="btn-gold" onclick="checkPassword()">Unlock</button>
        </div>
        <span class="lock-error" id="pw-error"></span>
    </div>
</div>

<div id="screen-pres">
    <div class="toolbar">
        <button class="tb-btn" onclick="goBack()">← Back</button>
        <div class="tb-sep"></div>
        <button class="tb-btn" onclick="present()">▶ Present</button>
        <button class="tb-btn" onclick="printSlides()">🖨 Print</button>
        <div class="tb-sep"></div>
        <select class="tb-btn" id="theme-sel" onchange="applyTheme(this.value)" style="padding:0.38rem 0.5rem;">
            <option value="dark">Dark</option>
            <option value="ocean">Ocean</option>
            <option value="forest">Forest</option>
            <option value="sunset">Sunset</option>
            <option value="light">Light</option>
        </select>
        <div class="tb-space"></div>
        <span class="tb-counter" id="tb-counter">1 / 1</span>
    </div>
    <div class="slide-area">
        <button class="nav-btn" id="btn-prev" onclick="nav(-1)" disabled>‹</button>
        <div class="slide-wrapper">
            <div class="slide" id="main-slide"></div>
        </div>
        <button class="nav-btn" id="btn-next" onclick="nav(1)">›</button>
    </div>
    <div class="dot-nav" id="dots"></div>
</div>

<div id="fs">
    <div class="fs-slide" id="fs-slide"></div>
    <div class="fs-controls">
        <button class="fs-btn" onclick="fsNav(-1)">‹ Prev</button>
        <span style="color:rgba(255,255,255,0.4);font-size:0.8rem;line-height:2.2" id="fs-counter"></span>
        <button class="fs-btn" onclick="fsNav(1)">Next ›</button>
        <button class="fs-btn" onclick="exitFs()">✕ Exit</button>
    </div>
</div>

<div id="print-view"></div>

<script>
// ════════════════════════════════════════════════════════════════════════════
//  SLIDES — edit this array in Windsurf to change the presentation
//
//  Slide types:
//    { type: 'title',      title: '...', subtitle: '...' }
//    { type: 'content',    title: '...', bullets: ['...', '...', '...'] }
//    { type: 'conclusion', title: '...', subtitle: '...' }
// ════════════════════════════════════════════════════════════════════════════
const SLIDES = [
    {
        type: 'title',
        title: 'Division — Going Deeper ➗',
        subtitle: 'A longer lesson for Year 2 / Year 3',
    },
    {
        type: 'content',
        title: 'What is Division? (Recap)',
        bullets: [
            'Division means splitting a number into equal groups',
            'We use the ➗ sign:  12 ➗ 3 = 4',
            'DIVIDEND ➗ DIVISOR = QUOTIENT',
            'Think of it as asking: "how many groups of ___ fit into ___?"',
        ],
    },
    {
        type: 'content',
        title: 'Two Ways to Think About Division',
        bullets: [
            'SHARING — split 12 sweets equally between 3 friends → 4 each',
            'GROUPING — put 12 sweets into bags of 3 → how many bags? → 4 bags',
            'Both give the same answer but think about it differently',
            'Try both ways and use whichever makes more sense to you!',
        ],
    },
    {
        type: 'content',
        title: 'Division and Multiplication Are Linked',
        bullets: [
            'Multiplication and division are opposites — they undo each other',
            'If  4 × 3 = 12,  then  12 ➗ 3 = 4  and  12 ➗ 4 = 3',
            'This is called a FACT FAMILY — three numbers that work together',
            'Fact family for 3, 4 and 12:  3×4=12 · 4×3=12 · 12➗3=4 · 12➗4=3',
        ],
    },
    {
        type: 'content',
        title: 'Using Times Tables to Divide',
        bullets: [
            '2 times table → helps divide by 2:  16 ➗ 2 = 8  (because 2×8=16)',
            '5 times table → helps divide by 5:  35 ➗ 5 = 7  (because 5×7=35)',
            '10 times table → helps divide by 10:  70 ➗ 10 = 7',
            '3 times table → helps divide by 3:  24 ➗ 3 = 8  (because 3×8=24)',
        ],
    },
    {
        type: 'content',
        title: 'Dividing by 2',
        bullets: [
            'Dividing by 2 is the same as finding HALF of a number',
            '½ of 10 = 5  →  10 ➗ 2 = 5',
            '½ of 18 = 9  →  18 ➗ 2 = 9',
            'Even numbers always divide exactly by 2 with no leftovers',
        ],
    },
    {
        type: 'content',
        title: 'Dividing by 5 and 10',
        bullets: [
            'Dividing by 10: just remove the zero!  60 ➗ 10 = 6',
            'Dividing by 5: think of your 5 times table  →  45 ➗ 5 = 9',
            'A number divisible by 5 always ends in 0 or 5',
            'A number divisible by 10 always ends in 0',
        ],
    },
    {
        type: 'content',
        title: 'What is a Remainder?',
        bullets: [
            'Sometimes a number does NOT split up perfectly equally',
            'The amount LEFT OVER is called the REMAINDER',
            'Example:  13 ➗ 4 = 3  remainder 1  (3 groups of 4 with 1 left over)',
            'We write it as:  13 ➗ 4 = 3 r 1',
        ],
    },
    {
        type: 'content',
        title: 'Remainders — More Examples',
        bullets: [
            '11 ➗ 3 = 3 r 2  →  3 groups of 3 = 9, with 2 left over',
            '17 ➗ 5 = 3 r 2  →  3 groups of 5 = 15, with 2 left over',
            '19 ➗ 4 = 4 r 3  →  4 groups of 4 = 16, with 3 left over',
            'The remainder is always SMALLER than the divisor',
        ],
    },
    {
        type: 'content',
        title: 'Remainders in Real Life',
        bullets: [
            '13 children need to sit in groups of 4 — how many full groups?',
            '13 ➗ 4 = 3 remainder 1 → 3 full groups and 1 child left over',
            'You have 22 eggs and each box holds 6 — how many full boxes?',
            '22 ➗ 6 = 3 remainder 4 → 3 full boxes and 4 eggs left over',
        ],
    },
    {
        type: 'content',
        title: 'Division Rules to Remember',
        bullets: [
            'Any number ➗ 1 = itself  →  15 ➗ 1 = 15',
            'Any number ➗ itself = 1  →  9 ➗ 9 = 1',
            'Zero divided by anything = 0  →  0 ➗ 5 = 0',
            'You can NEVER divide by zero — it is impossible!',
        ],
    },
    {
        type: 'content',
        title: 'Word Problems — Read Carefully!',
        bullets: [
            '28 children split into 4 equal teams — how many in each team?  →  28 ➗ 4 = 7',
            'A baker makes 30 biscuits and puts 5 in each bag — how many bags?  →  30 ➗ 5 = 6',
            '24 apples shared equally between 8 children — how many each?  →  24 ➗ 8 = 3',
            'Key words: shared equally, split into, how many each, how many groups',
        ],
    },
    {
        type: 'content',
        title: 'How to Check Your Answer',
        bullets: [
            'Always multiply your answer back to check!',
            '20 ➗ 4 = 5  →  check:  5 × 4 = 20 ✓',
            'With a remainder:  13 ➗ 3 = 4 r 1  →  check:  4 × 3 = 12,  12 + 1 = 13 ✓',
            'If your check works out, your answer is correct!',
        ],
    },
    {
        type: 'task',
        title: '✏️ Task 1 — Basic Division',
        questions: [
            { q: '16 ➗ 2 = ?', a: '8' },
            { q: '30 ➗ 5 = ?', a: '6' },
            { q: '40 ➗ 10 = ?', a: '4' },
            { q: '21 ➗ 3 = ?', a: '7' },
            { q: '32 ➗ 4 = ?', a: '8' },
        ],
    },
    {
        type: 'task',
        title: '✏️ Task 2 — Division with Remainders',
        questions: [
            { q: '17 ➗ 3 = ?', a: '5 r 2' },
            { q: '22 ➗ 5 = ?', a: '4 r 2' },
            { q: '19 ➗ 4 = ?', a: '4 r 3' },
            { q: '23 ➗ 6 = ?', a: '3 r 5' },
            { q: '29 ➗ 8 = ?', a: '3 r 5' },
        ],
    },
    {
        type: 'task',
        title: '✏️ Task 3 — Mixed Division',
        questions: [
            { q: '18 ➗ 2 = ?', a: '9' },
            { q: '35 ➗ 5 = ?', a: '7' },
            { q: '24 ➗ 3 = ?', a: '8' },
            { q: '25 ➗ 4 = ?', a: '6 r 1' },
            { q: '23 ➗ 6 = ?', a: '3 r 5' },
        ],
    },
    {
        type: 'task',
        title: '✏️ Task 4 — Word Problems',
        questions: [
            { q: '36 children sit in rows of 4 — how many rows?', a: '9 rows' },
            { q: '45 pencils shared between 9 children — how many each?', a: '5 each' },
            { q: '23 books split into groups of 5 — full groups and remainder?', a: '4 r 3' },
            { q: '32 eggs packed in boxes of 6 — how many full boxes?', a: '5 r 2' },
        ],
    },
    {
        type: 'conclusion',
        title: 'Brilliant Work! 🎉',
        subtitle: 'You can divide, find remainders, use fact families, and solve word problems!',
    },
];

// ════════════════════════════════════════════════════════════════════════════

const PASSWORD = '67';

function checkPassword() {
    if (document.getElementById('pw-input').value === PASSWORD) {
        document.getElementById('screen-lock').style.display = 'none';
        document.getElementById('screen-pres').classList.add('active');
        buildDots();
        renderSlide();
    } else {
        document.getElementById('pw-error').textContent = 'Wrong password.';
        document.getElementById('pw-input').value = '';
        document.getElementById('pw-input').focus();
    }
}

const themes = {
    dark:   { bg:'#0d0f1a', slide:'#161828', accent:'#f0c030', title:'#f0c030', text:'#dde0f0', sub:'#8888c0', num:'#888' },
    ocean:  { bg:'#040d1c', slide:'#071a38', accent:'#22d3ee', title:'#7de8f8', text:'#c0dff0', sub:'#6090b0', num:'#336' },
    forest: { bg:'#050e07', slide:'#091a0d', accent:'#4ade80', title:'#7cf0a0', text:'#c0e8d0', sub:'#508060', num:'#363' },
    sunset: { bg:'#160905', slide:'#26100a', accent:'#fb923c', title:'#fdb070', text:'#f0d0c0', sub:'#a06040', num:'#864' },
    light:  { bg:'#e8ecf4', slide:'#ffffff', accent:'#2563eb', title:'#1e293b', text:'#334155', sub:'#64748b', num:'#aaa' },
};

let idx = 0;
let theme = 'dark';
let revealCount = 0;

document.addEventListener('keydown', e => {
    if (document.getElementById('fs').classList.contains('active')) {
        if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') fsNav(1);
        else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') fsNav(-1);
        else if (e.key === 'Escape') exitFs();
    } else if (document.getElementById('screen-pres').classList.contains('active')) {
        if (e.key === 'ArrowRight' || e.key === 'ArrowDown') nav(1);
        else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') nav(-1);
        else if (e.key === 'f' || e.key === 'F') present();
    }
});

function goBack() {
    document.getElementById('screen-pres').classList.remove('active');
    document.getElementById('screen-lock').style.display = '';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-error').textContent = '';
    idx = 0;
}

function applyTheme(t) { theme = t; renderSlide(); }

function renderSlide() {
    const s  = SLIDES[idx];
    const th = themes[theme];
    const el = document.getElementById('main-slide');

    el.style.background = th.slide;
    document.getElementById('screen-pres').style.background = th.bg;

    const isCenter = (s.type === 'title' || s.type === 'conclusion');
    el.className = 'slide' + (isCenter ? ' center' : '');
    const acS = isCenter
        ? 'bottom:0;left:0;right:0;width:100%;height:4px'
        : 'top:0;left:0;bottom:0;width:5px;height:100%';

    if (isCenter) {
        el.innerHTML = `
            <div style="position:absolute;background:${th.accent};${acS}"></div>
            <h1 class="slide-title" style="color:${th.title}">${esc(s.title)}</h1>
            <p class="slide-sub" style="color:${th.sub}">${esc(s.subtitle||'')}</p>
            <span class="slide-num" style="color:${th.num}">${idx+1} / ${SLIDES.length}</span>`;
    } else if (s.type === 'task') {
        const qs = s.questions || [];
        const rows = qs.map((qa, qi) => `
            <div class="task-row">
                <span class="task-q" style="color:${th.text}">${esc(qa.q)}</span>
                <span class="task-a${qi < revealCount ? ' shown' : ''}" style="color:${th.accent}">${esc(qa.a)}</span>
            </div>`).join('');
        const hint = revealCount < qs.length
            ? `<p class="task-hint" style="color:${th.sub}">Press → to reveal answers one by one</p>`
            : `<p class="task-hint" style="color:${th.sub}">All answers shown — press → to continue</p>`;
        el.innerHTML = `
            <div style="position:absolute;background:${th.accent};${acS}"></div>
            <h2 class="slide-title" style="color:${th.title};margin-bottom:0.8rem">${esc(s.title)}</h2>
            <div class="task-list">${rows}</div>
            ${hint}
            <span class="slide-num" style="color:${th.num}">${idx+1} / ${SLIDES.length}</span>`;
    } else {
        const bHTML = (s.bullets||[]).map(b =>
            `<li><span class="bullet-dot" style="background:${th.accent}"></span><span style="color:${th.text}">${esc(b)}</span></li>`
        ).join('');
        el.innerHTML = `
            <div style="position:absolute;background:${th.accent};${acS}"></div>
            <h2 class="slide-title" style="color:${th.title}">${esc(s.title)}</h2>
            <ul class="slide-bullets">${bHTML}</ul>
            <span class="slide-num" style="color:${th.num}">${idx+1} / ${SLIDES.length}</span>`;
    }

    document.getElementById('btn-prev').disabled = idx === 0;
    document.getElementById('btn-next').disabled = idx === SLIDES.length - 1;
    document.getElementById('tb-counter').textContent = `${idx+1} / ${SLIDES.length}`;
    document.querySelectorAll('.dot').forEach((d,i) => d.classList.toggle('on', i===idx));
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function nav(d) {
    const s = SLIDES[idx];
    if (d > 0 && s.type === 'task' && revealCount < (s.questions||[]).length) {
        revealCount++;
        renderSlide();
        return;
    }
    revealCount = 0;
    const next = idx + d;
    if (next < 0 || next >= SLIDES.length) return;
    idx = next;
    renderSlide();
    highlightDot();
}

function buildDots() {
    document.getElementById('dots').innerHTML = SLIDES.map((_, i) =>
        `<span class="dot${i===0?' on':''}" onclick="jumpTo(${i})"></span>`
    ).join('');
}

function jumpTo(i) { idx = i; revealCount = 0; renderSlide(); }

function present() {
    renderFsSlide();
    document.getElementById('fs').classList.add('active');
}

function exitFs() { document.getElementById('fs').classList.remove('active'); }

function fsNav(d) {
    const s = SLIDES[idx];
    if (d > 0 && s.type === 'task' && revealCount < (s.questions||[]).length) {
        revealCount++;
        renderFsSlide();
        return;
    }
    revealCount = 0;
    const next = idx + d;
    if (next < 0 || next >= SLIDES.length) return;
    idx = next;
    renderFsSlide();
    document.querySelectorAll('.dot').forEach((dot,i) => dot.classList.toggle('on', i===idx));
    document.getElementById('btn-prev').disabled = idx === 0;
    document.getElementById('btn-next').disabled = idx === SLIDES.length - 1;
    document.getElementById('tb-counter').textContent = `${idx+1} / ${SLIDES.length}`;
}

function renderFsSlide() {
    const s  = SLIDES[idx];
    const th = themes[theme];
    const el = document.getElementById('fs-slide');

    el.style.background = th.slide;
    document.getElementById('fs').style.background = th.bg;

    const isCenter = (s.type === 'title' || s.type === 'conclusion');
    el.className = 'fs-slide' + (isCenter ? ' center' : '');
    const acS = isCenter
        ? 'bottom:0;left:0;right:0;width:100%;height:5px'
        : 'top:0;left:0;bottom:0;width:7px;height:100%';

    if (isCenter) {
        el.innerHTML = `
            <div style="position:absolute;background:${th.accent};${acS}"></div>
            <h1 class="fs-title" style="color:${th.title}">${esc(s.title)}</h1>
            <p class="fs-sub" style="color:${th.sub}">${esc(s.subtitle||'')}</p>
            <span class="fs-num" style="color:${th.num}">${idx+1} / ${SLIDES.length}</span>`;
    } else if (s.type === 'task') {
        const qs = s.questions || [];
        const rows = qs.map((qa, qi) => `
            <div class="fs-task-row">
                <span class="fs-task-q" style="color:${th.text}">${esc(qa.q)}</span>
                <span class="fs-task-a${qi < revealCount ? ' shown' : ''}" style="color:${th.accent}">${esc(qa.a)}</span>
            </div>`).join('');
        const hint = revealCount < qs.length
            ? `<p class="fs-task-hint" style="color:${th.sub}">Press → to reveal answers one by one</p>`
            : `<p class="fs-task-hint" style="color:${th.sub}">All answers shown — press → to continue</p>`;
        el.innerHTML = `
            <div style="position:absolute;background:${th.accent};${acS}"></div>
            <h2 class="fs-title" style="color:${th.title};margin-bottom:1.2rem">${esc(s.title)}</h2>
            <div class="fs-task-list">${rows}</div>
            ${hint}
            <span class="fs-num" style="color:${th.num}">${idx+1} / ${SLIDES.length}</span>`;
    } else {
        const bHTML = (s.bullets||[]).map(b =>
            `<li><span class="fs-dot" style="background:${th.accent}"></span><span style="color:${th.text}">${esc(b)}</span></li>`
        ).join('');
        el.innerHTML = `
            <div style="position:absolute;background:${th.accent};${acS}"></div>
            <h2 class="fs-title" style="color:${th.title}">${esc(s.title)}</h2>
            <ul class="fs-bullets">${bHTML}</ul>
            <span class="fs-num" style="color:${th.num}">${idx+1} / ${SLIDES.length}</span>`;
    }

    document.getElementById('fs-counter').textContent = `${idx+1} / ${SLIDES.length}`;
}

function printSlides() {
    const th = themes[theme];
    const pv = document.getElementById('print-view');
    pv.innerHTML = SLIDES.map((s, i) => {
        const isCenter = (s.type === 'title' || s.type === 'conclusion');
        let inner = '';
        if (isCenter) {
            inner = `<div class="p-accent" style="background:${th.accent};bottom:0;left:0;right:0;width:100%;height:5pt"></div>
                     <h1 class="p-title" style="color:${th.title}">${esc(s.title)}</h1>
                     <p class="p-sub" style="color:${th.sub}">${esc(s.subtitle||'')}</p>`;
        } else if (s.type === 'task') {
            const rows = (s.questions||[]).map(qa =>
                `<li style="display:flex;gap:12pt;align-items:baseline;font-size:13pt;margin-bottom:8pt">
                    <span style="flex:1;color:${th.text}">${esc(qa.q)}</span>
                    <span style="font-weight:800;color:${th.accent}">${esc(qa.a)}</span>
                 </li>`).join('');
            inner = `<div class="p-accent" style="background:${th.accent};top:0;left:0;bottom:0;width:6pt;height:100%"></div>
                     <h2 class="p-title" style="color:${th.title}">${esc(s.title)}</h2>
                     <ul style="list-style:none;margin-top:16pt">${rows}</ul>`;
        } else {
            inner = `<div class="p-accent" style="background:${th.accent};top:0;left:0;bottom:0;width:6pt;height:100%"></div>
                     <h2 class="p-title" style="color:${th.title}">${esc(s.title)}</h2>
                     <ul class="p-bullets">${(s.bullets||[]).map(b=>`<li><span class="p-bdot" style="background:${th.accent}"></span><span style="color:${th.text}">${esc(b)}</span></li>`).join('')}</ul>`;
        }
        return `<div class="p-slide${isCenter?' center':''}" style="background:${th.slide}">${inner}<span class="p-num" style="color:${th.num}">${i+1} / ${SLIDES.length}</span></div>`;
    }).join('');
    window.print();
}
</script>
</body>
</html>
