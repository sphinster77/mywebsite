<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Walkie Talkie — Davide's Workshop</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0d0f1a;
            color: #e8e8e8;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .back-link {
            position: fixed;
            top: 16px;
            left: 16px;
            color: #f0c030;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
            opacity: 0.7;
            transition: opacity 0.2s;
        }
        .back-link:hover { opacity: 1; }

        /* ── Walkie Talkie body ── */
        .walkie {
            background: linear-gradient(160deg, #2a2d3e 0%, #1a1c28 100%);
            border-radius: 28px 28px 40px 40px;
            width: min(320px, 90vw);
            padding: 1.5rem 1.4rem 2rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.08);
            border: 2px solid #2e3148;
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        /* Antenna */
        .antenna {
            position: absolute;
            top: -52px;
            right: 28px;
            width: 10px;
            height: 60px;
            background: linear-gradient(to top, #2e3148, #4a4e6a, #6a6e90);
            border-radius: 5px 5px 0 0;
        }
        .antenna::before {
            content: '';
            position: absolute;
            top: -6px;
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            height: 6px;
            background: #f0c030;
            border-radius: 50%;
            box-shadow: 0 0 8px #f0c030;
        }

        /* Brand label */
        .brand {
            text-align: center;
            font-size: 0.65rem;
            letter-spacing: 3px;
            color: #5a5e7a;
            font-weight: 700;
            text-transform: uppercase;
        }

        /* Screen */
        .screen {
            background: #0a1a0a;
            border-radius: 10px;
            padding: 0.75rem 1rem;
            border: 2px solid #1a3a1a;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.6), 0 0 12px rgba(0,200,80,0.06);
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }
        .screen-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .freq-label {
            font-size: 0.6rem;
            color: #2a6a2a;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .freq-value {
            font-family: 'Courier New', monospace;
            font-size: 1.5rem;
            font-weight: 700;
            color: #30ff60;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(48,255,96,0.5);
        }
        .channel-label {
            font-size: 0.6rem;
            color: #2a6a2a;
            letter-spacing: 1px;
        }
        .channel-value {
            font-family: 'Courier New', monospace;
            font-size: 0.95rem;
            color: #30ff60;
        }

        /* Signal bars */
        .signal-bars {
            display: flex;
            align-items: flex-end;
            gap: 3px;
            height: 18px;
        }
        .bar {
            width: 5px;
            background: #1a4a1a;
            border-radius: 2px;
            transition: background 0.15s;
        }
        .bar:nth-child(1) { height: 5px; }
        .bar:nth-child(2) { height: 8px; }
        .bar:nth-child(3) { height: 11px; }
        .bar:nth-child(4) { height: 14px; }
        .bar:nth-child(5) { height: 18px; }
        .bar.active { background: #30ff60; box-shadow: 0 0 4px rgba(48,255,96,0.5); }

        /* Status */
        .status-line {
            font-family: 'Courier New', monospace;
            font-size: 0.7rem;
            color: #30ff60;
            opacity: 0.6;
            text-align: center;
            min-height: 1em;
        }
        .status-line.tx { color: #ff4040; opacity: 1; animation: blink 0.5s infinite; }
        .status-line.rx { color: #30ff60; opacity: 1; }
        @keyframes blink { 50% { opacity: 0.3; } }

        /* Speaker grille */
        .grille {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 4px;
            padding: 0.5rem;
            background: #141624;
            border-radius: 10px;
            border: 1px solid #2e3148;
        }
        .grille-hole {
            width: 100%;
            aspect-ratio: 1;
            background: #0d0f1a;
            border-radius: 50%;
        }

        /* Volume meter */
        .meter-wrap {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        .meter-label { font-size: 0.65rem; color: #5a5e7a; letter-spacing: 1px; text-transform: uppercase; width: 32px; }
        .meter-bar-bg {
            flex: 1;
            height: 8px;
            background: #1a1c28;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid #2e3148;
        }
        .meter-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(to right, #30ff60, #f0c030, #ff4040);
            border-radius: 4px;
            transition: width 0.05s;
        }

        /* Channel knob row */
        .knob-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 0.2rem;
        }
        .knob-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.3rem;
        }
        .knob-label { font-size: 0.6rem; color: #5a5e7a; letter-spacing: 1px; text-transform: uppercase; }
        .knob {
            width: 38px;
            height: 38px;
            background: radial-gradient(circle at 35% 35%, #4a4e6a, #1a1c28);
            border-radius: 50%;
            border: 3px solid #2e3148;
            cursor: pointer;
            position: relative;
            box-shadow: 0 3px 8px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.06);
            transition: transform 0.2s;
            user-select: none;
        }
        .knob::after {
            content: '';
            position: absolute;
            top: 4px;
            left: 50%;
            transform: translateX(-50%);
            width: 3px;
            height: 8px;
            background: #f0c030;
            border-radius: 2px;
        }
        .knob:hover { filter: brightness(1.15); }

        /* PTT Button */
        .ptt-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }
        .ptt-label {
            font-size: 0.65rem;
            letter-spacing: 2px;
            color: #5a5e7a;
            text-transform: uppercase;
        }
        .ptt-btn {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 5px solid #c0392b;
            background: radial-gradient(circle at 38% 35%, #e74c3c, #922b21);
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(231,76,60,0.4), 0 0 0 8px rgba(231,76,60,0.1), inset 0 2px 0 rgba(255,255,255,0.12);
            transition: transform 0.08s, box-shadow 0.08s, background 0.08s;
            color: white;
            font-weight: 900;
            font-size: 0.75rem;
            letter-spacing: 2px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .ptt-btn .ptt-icon { font-size: 1.6rem; }
        .ptt-btn:active, .ptt-btn.pressed {
            transform: translateY(3px);
            box-shadow: 0 2px 10px rgba(231,76,60,0.5), 0 0 0 8px rgba(231,76,60,0.2), inset 0 2px 6px rgba(0,0,0,0.3);
            background: radial-gradient(circle at 38% 35%, #ff6b6b, #e74c3c);
        }

        /* Mode toggle row */
        .mode-row {
            display: flex;
            gap: 0.5rem;
        }
        .mode-btn {
            flex: 1;
            padding: 0.45rem;
            border-radius: 8px;
            border: 1px solid #2e3148;
            background: #141624;
            color: #5a5e7a;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.15s;
            text-transform: uppercase;
        }
        .mode-btn.active {
            background: #1a2a1a;
            border-color: #30ff60;
            color: #30ff60;
        }
        .mode-btn:hover:not(.active) { border-color: #4a4e6a; color: #9090b0; }

        /* Tip */
        .tip {
            text-align: center;
            font-size: 0.72rem;
            color: #5a5e7a;
            padding-top: 0.25rem;
        }

        /* Permission denied banner */
        #mic-denied {
            display: none;
            background: #2a0a0a;
            border: 1px solid #e05050;
            border-radius: 10px;
            padding: 0.75rem 1rem;
            font-size: 0.8rem;
            color: #e05050;
            text-align: center;
        }
    </style>
</head>
<body>

<a class="back-link" href="index.html">← Back</a>

<div class="walkie">
    <div class="antenna"></div>
    <div class="brand">DK-Radio · Mk I</div>

    <!-- Screen -->
    <div class="screen">
        <div class="screen-row">
            <span class="freq-label">MHz</span>
            <div class="signal-bars" id="signalBars">
                <div class="bar active"></div>
                <div class="bar active"></div>
                <div class="bar active"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </div>
        </div>
        <div class="freq-value" id="freqDisplay">462.550</div>
        <div class="screen-row">
            <span class="channel-label">CH</span>
            <span class="channel-value" id="chDisplay">01</span>
        </div>
        <div class="status-line" id="statusLine">STANDBY</div>
    </div>

    <!-- Speaker grille -->
    <div class="grille" id="grille">
        <script>for(let i=0;i<32;i++)document.write('<div class="grille-hole"></div>')</script>
    </div>

    <!-- Volume meter -->
    <div class="meter-wrap">
        <span class="meter-label">VOL</span>
        <div class="meter-bar-bg"><div class="meter-bar-fill" id="meterFill"></div></div>
    </div>

    <!-- Channel / Volume knobs -->
    <div class="knob-row">
        <div class="knob-group">
            <div class="knob" id="chKnob" title="Channel"></div>
            <span class="knob-label">CHAN</span>
        </div>
        <div class="ptt-wrap">
            <span class="ptt-label">PTT</span>
            <button class="ptt-btn" id="pttBtn">
                <span class="ptt-icon">📡</span>
                TALK
            </button>
        </div>
        <div class="knob-group">
            <div class="knob" id="volKnob" title="Effect Strength"></div>
            <span class="knob-label">EFFECT</span>
        </div>
    </div>

    <!-- Mode buttons -->
    <div class="mode-row">
        <button class="mode-btn active" id="modeRadio" onclick="setMode('radio')">RADIO</button>
        <button class="mode-btn" id="modeClear" onclick="setMode('clear')">CLEAR</button>
        <button class="mode-btn" id="modeBuzz" onclick="setMode('buzz')">BUZZ</button>
    </div>

    <div id="mic-denied">🎤 Microphone access denied. Please allow mic in browser settings.</div>

    <div class="tip">Hold TALK to transmit · Release to play back</div>
</div>

<script>
// ── State ────────────────────────────────────────────────────────────────────
const CHANNELS = [
    { ch:'01', freq:'462.550' }, { ch:'02', freq:'462.575' },
    { ch:'03', freq:'462.600' }, { ch:'04', freq:'462.625' },
    { ch:'05', freq:'462.650' }, { ch:'06', freq:'462.675' },
    { ch:'07', freq:'462.700' }, { ch:'08', freq:'467.550' },
];

let currentChannel = 0;
let effectMode = 'radio'; // 'radio' | 'clear' | 'buzz'
let effectStrength = 0.7; // 0..1
let mediaRecorder = null;
let audioChunks = [];
let isRecording = false;
let analyserNode = null;
let meterAF = null;
let micStream = null;
let audioCtx = null;

// ── UI refs ───────────────────────────────────────────────────────────────────
const pttBtn      = document.getElementById('pttBtn');
const freqDisplay = document.getElementById('freqDisplay');
const chDisplay   = document.getElementById('chDisplay');
const statusLine  = document.getElementById('statusLine');
const meterFill   = document.getElementById('meterFill');
const signalBars  = document.getElementById('signalBars').children;

// ── Channel knob ─────────────────────────────────────────────────────────────
let chKnobAngle = 0;
document.getElementById('chKnob').addEventListener('click', () => {
    currentChannel = (currentChannel + 1) % CHANNELS.length;
    chKnobAngle += 45;
    document.getElementById('chKnob').style.transform = `rotate(${chKnobAngle}deg)`;
    freqDisplay.textContent = CHANNELS[currentChannel].freq;
    chDisplay.textContent   = CHANNELS[currentChannel].ch;
    playClickSound(300, 0.04);
    setStatus('STANDBY', '');
});

// ── Effect knob ───────────────────────────────────────────────────────────────
let volKnobAngle = -60;
document.getElementById('volKnob').style.transform = `rotate(${volKnobAngle}deg)`;
document.getElementById('volKnob').addEventListener('click', () => {
    effectStrength = effectStrength >= 0.9 ? 0.3 : effectStrength + 0.2;
    const steps = (effectStrength - 0.3) / 0.2; // 0..3
    volKnobAngle = -60 + steps * 40;
    document.getElementById('volKnob').style.transform = `rotate(${volKnobAngle}deg)`;
    playClickSound(500, 0.04);
});

// ── Mode ──────────────────────────────────────────────────────────────────────
function setMode(m) {
    effectMode = m;
    ['radio','clear','buzz'].forEach(id => {
        document.getElementById('mode' + id.charAt(0).toUpperCase() + id.slice(1)).classList.toggle('active', id === m);
    });
    playClickSound(400, 0.04);
}

// ── Status helper ─────────────────────────────────────────────────────────────
function setStatus(text, cls) {
    statusLine.textContent = text;
    statusLine.className = 'status-line' + (cls ? ' ' + cls : '');
}

// ── Signal bars animation ─────────────────────────────────────────────────────
function animateSignal(level) { // level 0..1
    const lit = Math.round(level * 5);
    for (let i = 0; i < 5; i++) {
        signalBars[i].classList.toggle('active', i < lit);
    }
}

// ── AudioContext lazy init ────────────────────────────────────────────────────
function getAudioCtx() {
    if (!audioCtx || audioCtx.state === 'closed') {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
}

// ── Click/beep sounds ─────────────────────────────────────────────────────────
function playClickSound(freq, dur) {
    try {
        const ctx = getAudioCtx();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.12, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
        osc.start(); osc.stop(ctx.currentTime + dur);
    } catch(e) {}
}

function playStaticBurst(duration, vol = 0.15) {
    try {
        const ctx = getAudioCtx();
        const bufLen = ctx.sampleRate * duration;
        const buf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < bufLen; i++) data[i] = (Math.random() * 2 - 1);

        const src = ctx.createBufferSource();
        src.buffer = buf;

        const bp = ctx.createBiquadFilter();
        bp.type = 'bandpass'; bp.frequency.value = 2000; bp.Q.value = 0.5;

        const gain = ctx.createGain();
        gain.gain.setValueAtTime(vol, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);

        src.connect(bp); bp.connect(gain); gain.connect(ctx.destination);
        src.start(); src.stop(ctx.currentTime + duration);
    } catch(e) {}
}

// ── Mic + recording ───────────────────────────────────────────────────────────
async function getMicStream() {
    if (micStream && micStream.active) return micStream;
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    return micStream;
}

async function startRecording() {
    if (isRecording) return;
    try {
        const stream = await getMicStream();
        document.getElementById('mic-denied').style.display = 'none';

        isRecording = true;
        audioChunks = [];
        pttBtn.classList.add('pressed');
        setStatus('TX ●', 'tx');
        playStaticBurst(0.12, 0.2);
        playClickSound(1200, 0.06);

        // Volume meter while recording
        const ctx = getAudioCtx();
        const src = ctx.createMediaStreamSource(stream);
        analyserNode = ctx.createAnalyser();
        analyserNode.fftSize = 256;
        src.connect(analyserNode);
        startMeterLoop();

        animateSignal(0.8);

        mediaRecorder = new MediaRecorder(stream);
        mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
        mediaRecorder.start();
    } catch(err) {
        document.getElementById('mic-denied').style.display = 'block';
        setStatus('MIC ERROR', '');
    }
}

function stopRecording() {
    if (!isRecording || !mediaRecorder) return;
    isRecording = false;
    pttBtn.classList.remove('pressed');

    stopMeterLoop();
    meterFill.style.width = '0%';

    mediaRecorder.stop();
    mediaRecorder.onstop = () => {
        playStaticBurst(0.1, 0.18);
        playClickSound(900, 0.05);
        setStatus('RX ▶', 'rx');
        animateSignal(0.6);
        setTimeout(() => playback(), 150);
    };
}

// ── Volume meter ──────────────────────────────────────────────────────────────
function startMeterLoop() {
    if (!analyserNode) return;
    const data = new Uint8Array(analyserNode.frequencyBinCount);
    function tick() {
        analyserNode.getByteFrequencyData(data);
        const avg = data.reduce((a,b) => a+b,0) / data.length;
        meterFill.style.width = Math.min(avg / 128 * 140, 100) + '%';
        meterAF = requestAnimationFrame(tick);
    }
    meterAF = requestAnimationFrame(tick);
}
function stopMeterLoop() {
    if (meterAF) cancelAnimationFrame(meterAF);
    meterAF = null;
}

// ── Playback with radio effect ────────────────────────────────────────────────
async function playback() {
    if (audioChunks.length === 0) { setStatus('STANDBY', ''); return; }

    const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType });
    const arrayBuf = await blob.arrayBuffer();
    const ctx = getAudioCtx();

    let decoded;
    try { decoded = await ctx.decodeAudioData(arrayBuf); }
    catch(e) { setStatus('STANDBY', ''); return; }

    const src = ctx.createBufferSource();
    src.buffer = decoded;

    // Build effect chain
    let node = src;

    if (effectMode === 'radio') {
        // Bandpass to simulate radio narrowband
        const bp = ctx.createBiquadFilter();
        bp.type = 'bandpass';
        bp.frequency.value = 1100;
        bp.Q.value = 0.6 + effectStrength * 0.8;
        node.connect(bp); node = bp;

        // Distortion / saturation
        const dist = ctx.createWaveShaper();
        dist.curve = makeDistCurve(80 * effectStrength);
        dist.oversample = '4x';
        node.connect(dist); node = dist;

        // Compression
        const comp = ctx.createDynamicsCompressor();
        comp.threshold.value = -20;
        comp.knee.value = 10;
        comp.ratio.value = 8;
        comp.attack.value = 0.001;
        comp.release.value = 0.05;
        node.connect(comp); node = comp;

    } else if (effectMode === 'buzz') {
        // Ring modulator style buzz
        const osc = ctx.createOscillator();
        osc.frequency.value = 60;
        const ring = ctx.createGain();
        ring.gain.value = 0;
        osc.connect(ring.gain);
        node.connect(ring); node = ring;
        osc.start();

        // High-pass to thin it out
        const hp = ctx.createBiquadFilter();
        hp.type = 'highpass'; hp.frequency.value = 400;
        node.connect(hp); node = hp;

        src.onended = () => osc.stop();
    }
    // 'clear' mode: no effect, just connect directly

    const masterGain = ctx.createGain();
    masterGain.gain.value = 1.4;
    node.connect(masterGain);
    masterGain.connect(ctx.destination);

    // Animate signal + meter during playback
    const dur = decoded.duration;
    animateSignal(1);
    let elapsed = 0;
    const step = 80;
    const ticker = setInterval(() => {
        elapsed += step;
        const fake = 0.5 + 0.5 * Math.sin(elapsed / 120) * Math.random();
        meterFill.style.width = (fake * 70) + '%';
        animateSignal(0.4 + fake * 0.6);
        if (elapsed >= dur * 1000) {
            clearInterval(ticker);
            meterFill.style.width = '0%';
            animateSignal(0.6);
            setStatus('STANDBY', '');
        }
    }, step);

    src.start();
}

function makeDistCurve(amount) {
    const n = 256, curve = new Float32Array(n);
    const deg = Math.PI / 180;
    for (let i = 0; i < n; i++) {
        const x = (i * 2) / n - 1;
        curve[i] = (3 + amount) * x * 20 * deg / (Math.PI + amount * Math.abs(x));
    }
    return curve;
}

// ── PTT button events ─────────────────────────────────────────────────────────
pttBtn.addEventListener('mousedown', e => { e.preventDefault(); startRecording(); });
pttBtn.addEventListener('mouseup',   () => stopRecording());
pttBtn.addEventListener('mouseleave',() => { if (isRecording) stopRecording(); });

pttBtn.addEventListener('touchstart', e => { e.preventDefault(); startRecording(); }, { passive: false });
pttBtn.addEventListener('touchend',   e => { e.preventDefault(); stopRecording(); });
pttBtn.addEventListener('touchcancel',e => { e.preventDefault(); stopRecording(); });

// Space bar shortcut
document.addEventListener('keydown', e => {
    if (e.code === 'Space' && !e.repeat && !isRecording) { e.preventDefault(); startRecording(); }
});
document.addEventListener('keyup', e => {
    if (e.code === 'Space') { e.preventDefault(); stopRecording(); }
});
</script>
</body>
</html>
